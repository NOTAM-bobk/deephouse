<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Netflix — Streaming UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0c; --bg-elev:#141416; --card:#1c1c1f; --card-hover:#232327;
  --text:#f3f1ec; --text-dim:#9a9a9e; --text-faint:#5e5e63;
  --accent:#e0263b; --accent-dim:#9c1a29; --gold:#f5c451;
  --border:rgba(255,255,255,0.08); --shadow:0 20px 60px rgba(0,0,0,0.55);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
::selection{background:var(--accent);color:#fff;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
img{display:block;max-width:100%;}

/* sprocket */
.sprocket{display:flex;gap:7px;align-items:center;}
.sprocket span{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.55;}
.sprocket.long span{width:4px;height:4px;}

/* Nav */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 4vw;transition:background .35s,padding .35s,box-shadow .35s;}
.nav.scrolled{background:rgba(20,20,24,0.4);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);box-shadow:0 4px 24px rgba(0,0,0,.25);padding:10px 4vw;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--accent);display:flex;align-items:center;gap:8px;cursor:pointer;}
.nav-links{display:flex;gap:26px;font-size:14px;font-weight:500;color:var(--text-dim);}
.nav-links a{transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.nav-right{display:flex;align-items:center;gap:18px;}
.search-wrap{display:flex;align-items:center;position:relative;}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text);opacity:.85;transition:opacity .2s,background .2s;}
.icon-btn:hover{opacity:1;background:rgba(255,255,255,.08);}
.icon-btn.active{background:rgba(255,255,255,.1);opacity:1;}
.search-panel{position:absolute;top:calc(100% + 12px);right:0;width:340px;max-width:88vw;background:rgba(18,18,21,0.88);backdrop-filter:blur(26px) saturate(160%);-webkit-backdrop-filter:blur(26px) saturate(160%);border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:var(--shadow);opacity:0;transform:translateY(-8px) scale(.98);pointer-events:none;transition:opacity .2s,transform .2s;}
.search-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.search-field{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:11px;padding:11px 14px;transition:border-color .2s,background .2s;}
.search-field:focus-within{border-color:var(--accent);background:rgba(255,255,255,.1);}
.search-field svg{flex-shrink:0;color:var(--text-dim);}
.search-field input{flex:1;background:none;border:none;color:var(--text);font-size:14.5px;outline:none;}
.search-field input::placeholder{color:var(--text-faint);}
.search-clear{flex-shrink:0;color:var(--text-faint);font-size:15px;line-height:1;width:20px;height:20px;display:none;align-items:center;justify-content:center;border-radius:50%;}
.search-clear:hover{color:var(--text);background:rgba(255,255,255,.08);}
.recent-wrap{margin-top:14px;}
.recent-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:0 2px;}
.recent-head span{font-size:10.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text-faint);font-weight:700;}
.recent-head button{font-size:11px;color:var(--text-dim);}
.recent-head button:hover{color:var(--text);}
.recent-list{display:flex;flex-direction:column;gap:1px;max-height:240px;overflow-y:auto;}
.recent-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:9px;font-size:13.5px;color:var(--text-dim);cursor:pointer;transition:background .15s,color .15s;}
.recent-item:hover{background:rgba(255,255,255,.07);color:var(--text);}
.recent-item svg{width:14px;height:14px;flex-shrink:0;color:var(--text-faint);}
.recent-empty{font-size:12px;color:var(--text-faint);padding:8px 2px;}

/* Hero */
.hero{position:relative;height:92vh;min-height:560px;width:100%;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease;background-size:cover;background-position:top center;}
.hero-slide.active{opacity:1;}
.hero-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,12,0.15) 0%,rgba(10,10,12,0.05) 30%,rgba(10,10,12,0.85) 82%,var(--bg) 100%),linear-gradient(90deg,rgba(10,10,12,0.75) 0%,rgba(10,10,12,0.15) 48%,rgba(10,10,12,0.05) 70%);}
.hero-content{position:relative;z-index:2;padding:0 4vw 64px;max-width:680px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,84px);line-height:1.02;letter-spacing:1px;text-shadow:0 8px 30px rgba(0,0,0,.5);}
.hero-meta{display:flex;gap:14px;align-items:center;font-size:13px;color:var(--text-dim);margin-bottom:16px;flex-wrap:wrap;margin-top:12px;}
.hero-meta .rating{color:var(--gold);font-weight:700;}
.hero-overview{color:var(--text-dim);font-size:15px;line-height:1.6;max-width:560px;margin-bottom:24px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;}
.btn{display:flex;align-items:center;gap:8px;padding:12px 24px;border-radius:6px;font-weight:700;font-size:14.5px;transition:transform .15s,background .2s,opacity .2s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--text);color:#000;}
.btn-primary:hover{background:#d8d6d0;}
.btn-ghost{background:rgba(120,120,130,0.35);color:var(--text);backdrop-filter:blur(6px);}
.btn-ghost:hover{background:rgba(120,120,130,0.5);}
.btn-play{background:var(--accent);color:#fff;}
.btn-play:hover{background:#c41f32;}
.hero-dots{position:absolute;bottom:18px;right:4vw;z-index:3;display:flex;gap:8px;}
.hero-dots button{width:22px;height:3px;background:rgba(255,255,255,.3);border-radius:2px;transition:background .25s,width .25s;}
.hero-dots button.active{background:var(--accent);width:34px;}

/* Rows */
.rows{position:relative;z-index:2;margin-top:48px;padding-bottom:40px;}
.row{margin-bottom:38px;}
.row-head{display:flex;align-items:baseline;gap:10px;padding:0 4vw;margin-bottom:12px;}
.row-title{font-size:18px;font-weight:800;letter-spacing:.3px;}
.row-track{display:flex;gap:10px;overflow-x:auto;padding:4px 4vw 18px;scroll-snap-type:x proximity;scrollbar-width:none;}
.row-track::-webkit-scrollbar{display:none;}
.top10-track{padding-left:9vw;}
.top10-item{display:flex;align-items:flex-end;flex:0 0 auto;scroll-snap-align:start;}
.top10-rank{font-family:'Bebas Neue',sans-serif;font-size:128px;line-height:0.72;color:transparent;-webkit-text-stroke:2px var(--text-faint);margin-right:-30px;position:relative;top:18px;user-select:none;pointer-events:none;}
.card{position:relative;flex:0 0 auto;width:170px;aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:var(--card);scroll-snap-align:start;cursor:pointer;transition:transform .25s,box-shadow .25s;border:1px solid var(--border);}
.card:hover{transform:scale(1.08) translateY(-6px);z-index:5;box-shadow:var(--shadow),0 0 0 2px var(--accent);}
.card img{width:100%;height:100%;object-fit:cover;}
.card-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;font-size:13px;color:var(--text-dim);background:linear-gradient(160deg,#232327,#16161a);}
.card-meta{position:absolute;left:0;right:0;bottom:0;padding:8px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.92));opacity:0;transition:opacity .2s;font-size:11.5px;}
.card:hover .card-meta{opacity:1;}
.card-meta .r{color:var(--gold);font-weight:700;}
.skel{flex:0 0 auto;width:170px;aspect-ratio:2/3;border-radius:8px;background:linear-gradient(100deg,var(--card) 30%,var(--card-hover) 50%,var(--card) 70%);background-size:200% 100%;animation:shimmer 1.4s infinite;}

/* Continue Watching */
.cw-card{position:relative;flex:0 0 auto;width:280px;border-radius:10px;overflow:hidden;background:var(--card);scroll-snap-align:start;cursor:pointer;border:1px solid var(--border);transition:transform .25s,box-shadow .25s;}
.cw-card:hover{transform:scale(1.04) translateY(-4px);z-index:5;box-shadow:var(--shadow),0 0 0 2px var(--accent);}
.cw-thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#111;}
.cw-thumb img{width:100%;height:100%;object-fit:cover;}
.cw-thumb-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-dim);}
.cw-progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.15);}
.cw-progress-fill{height:100%;background:var(--accent);transition:width .3s;}
.cw-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background .2s;opacity:0;}
.cw-card:hover .cw-play-overlay{opacity:1;background:rgba(0,0,0,0.45);}
.cw-play-overlay svg{width:44px;height:44px;color:#fff;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8));}
.cw-info{padding:10px 12px 12px;}
.cw-title{font-size:13.5px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cw-sub{font-size:11.5px;color:var(--text-faint);}
.cw-remove{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(10,10,12,0.75);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .2s;z-index:3;}
.cw-card:hover .cw-remove{opacity:1;}
.cw-remove:hover{background:var(--accent);}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty-row{padding:0 4vw;color:var(--text-faint);font-size:13.5px;}

/* Search */
.search-view{display:none;padding:120px 4vw 60px;}
.search-view.show{display:block;}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
.search-heading{font-size:22px;font-family:'Bebas Neue';letter-spacing:1px;margin-bottom:18px;}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:0;transition:background .2s;}
.modal-backdrop.show{display:flex;}
.modal{width:100%;max-width:880px;height:94vh;max-height:94vh;background:var(--bg-elev);border-radius:20px 20px 0 0;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);border-bottom:none;display:flex;flex-direction:column;animation:riseUp .32s cubic-bezier(.22,.8,.25,1);}
@keyframes riseUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-drag-handle{flex-shrink:0;display:flex;justify-content:center;padding:12px 0 8px;cursor:grab;touch-action:none;}
.modal-drag-handle .bar{width:42px;height:4px;border-radius:3px;background:var(--text-faint);opacity:.6;}
.modal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-hero{position:relative;aspect-ratio:16/8;background-size:cover;background-position:center;}
.modal-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,12,.1),var(--bg-elev) 95%);}
.modal-close{position:absolute;top:14px;right:14px;z-index:5;width:34px;height:34px;border-radius:50%;background:rgba(10,10,12,.75);display:flex;align-items:center;justify-content:center;font-size:18px;}
.modal-title-wrap{position:absolute;bottom:18px;left:28px;right:28px;z-index:2;}
.modal-title{font-family:'Bebas Neue';font-size:clamp(28px,5vw,42px);letter-spacing:1px;}
.modal-body{padding:10px 28px 32px;}
.modal-actions{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.modal-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--text-dim);margin-bottom:14px;}
.pill{border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text-dim);}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.modal-overview{color:var(--text-dim);line-height:1.65;font-size:14.5px;margin-bottom:18px;}
.cast-label{font-size:12px;color:var(--text-faint);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.cast-list{font-size:13.5px;color:var(--text-dim);margin-bottom:18px;}
.trailer-frame{position:relative;width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#000;margin-top:6px;display:none;}
.trailer-frame.show{display:block;}
.trailer-frame iframe{width:100%;height:100%;border:0;}
.episodes-wrap{margin-top:6px;margin-bottom:18px;}
.episodes-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap;}
.season-select{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;}
.episode-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);position:relative;}
.episode-item:last-child{border-bottom:none;}
.episode-num{flex-shrink:0;width:26px;text-align:center;color:var(--text-faint);font-weight:700;font-size:14px;padding-top:2px;}
.episode-still{flex-shrink:0;width:120px;aspect-ratio:16/9;border-radius:6px;overflow:hidden;background:var(--card);position:relative;}
.episode-still img{width:100%;height:100%;object-fit:cover;}
.episode-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;cursor:pointer;border-radius:6px;}
.episode-still:hover .episode-play-overlay{opacity:1;}
.episode-play-overlay svg{width:32px;height:32px;color:#fff;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
.episode-info{flex:1;min-width:0;}
.episode-title{font-size:13.5px;font-weight:700;margin-bottom:3px;}
.episode-meta{font-size:11.5px;color:var(--text-faint);margin-bottom:5px;}
.episode-overview{font-size:12.5px;color:var(--text-dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.episode-loading{font-size:12.5px;color:var(--text-faint);padding:10px 0;}
.note{font-size:11.5px;color:var(--text-faint);margin-top:18px;line-height:1.5;border-top:1px solid var(--border);padding-top:14px;}

/* Player */
.player-popup{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);animation:fadeInPlayer .2s ease;}
.player-popup.show{display:flex;}
@keyframes fadeInPlayer{from{opacity:0}to{opacity:1}}
.player-wrap{position:relative;width:95vw;max-width:1280px;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(255,255,255,0.06);}
.player-wrap iframe{width:100%;height:100%;border:0;display:block;}
.player-close{position:absolute;top:-14px;right:-14px;width:36px;height:36px;border-radius:50%;background:rgba(30,30,34,0.95);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text);cursor:pointer;z-index:10;transition:background .2s,transform .15s;box-shadow:0 4px 16px rgba(0,0,0,0.5);}
.player-close:hover{background:var(--accent);transform:scale(1.1);}
.player-label{position:absolute;top:-44px;left:0;right:44px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-source-note{position:absolute;bottom:-28px;left:0;font-size:11px;color:rgba(255,255,255,0.3);}

/* Explore More button */
.explore-btn-wrap{display:flex;justify-content:center;padding:24px 0 60px;}
.explore-btn{
  display:flex;align-items:center;gap:12px;
  padding:16px 40px;border-radius:40px;
  background:linear-gradient(135deg,rgba(224,38,59,0.15),rgba(224,38,59,0.05));
  border:1px solid rgba(224,38,59,0.35);
  color:var(--text);font-size:16px;font-weight:700;letter-spacing:.5px;
  transition:all .3s;cursor:pointer;
  box-shadow:0 0 0 0 rgba(224,38,59,0);
}
.explore-btn:hover{
  background:linear-gradient(135deg,rgba(224,38,59,0.28),rgba(224,38,59,0.12));
  border-color:var(--accent);
  box-shadow:0 0 32px rgba(224,38,59,0.25);
  transform:translateY(-2px);
}
.explore-btn svg{width:20px;height:20px;color:var(--accent);}

/* Explore overlay */
.explore-overlay{
  position:fixed;inset:0;z-index:500;
  background:var(--bg);
  display:none;flex-direction:column;
  overflow:hidden;
}
.explore-overlay.show{display:flex;animation:slideUpOverlay .4s cubic-bezier(.22,.8,.25,1);}
@keyframes slideUpOverlay{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.explore-header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:20px 4vw 16px;
  border-bottom:1px solid var(--border);
  background:rgba(10,10,12,0.9);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.explore-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text);}
.explore-filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.explore-filter{
  padding:6px 16px;border-radius:20px;font-size:12.5px;font-weight:600;
  border:1px solid var(--border);color:var(--text-dim);
  transition:all .2s;cursor:pointer;
}
.explore-filter:hover{border-color:var(--accent);color:var(--text);}
.explore-filter.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.explore-close{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background .2s;}
.explore-close:hover{background:var(--accent);}
.explore-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 4vw;}
.explore-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.explore-skel{aspect-ratio:2/3;border-radius:8px;background:linear-gradient(100deg,var(--card) 30%,var(--card-hover) 50%,var(--card) 70%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
.explore-load-trigger{height:60px;display:flex;align-items:center;justify-content:center;margin-top:12px;}
.explore-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.explore-header-inner{flex:1;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#fff;color:#000;padding:11px 20px;border-radius:8px;font-size:13.5px;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;z-index:1300;box-shadow:var(--shadow);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Footer */
.footer{padding:50px 4vw 80px;color:var(--text-faint);font-size:12px;display:flex;flex-direction:column;gap:10px;align-items:center;text-align:center;}

/* Bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(15,15,17,0.55);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));}
.bottom-nav button{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-dim);font-size:11px;font-weight:600;flex:1;padding:4px 0;transition:color .2s;}
.bottom-nav button.active{color:var(--accent);}
.bottom-nav svg{width:20px;height:20px;}

@media(max-width:640px){
  .nav-links{display:none;}
  .hero{height:80vh;}
  .hero-content{padding:0 5vw 48px;}
  .card{width:128px;}
  .skel{width:128px;}
  .cw-card{width:220px;}
  .search-panel{width:86vw;right:-8px;}

<script>
/* ===== Intro ===== */
(function(){
  const FUR=31,LAMP=28;
  const brush=()=>{let s='';for(let i=FUR;i>=1;i--)s+=`<span class="fur-${i}"></span>`;return`<div class="effect-brush">${s}</div>`;}
  const lumieres=()=>{let s='';for(let i=1;i<=LAMP;i++)s+=`<span class="lamp-${i}"></span>`;return`<div class="effect-lumieres">${s}</div>`;}
  const helper=n=>`<div class="helper-${n}">${brush()}${lumieres()}</div>`;
  const el=document.getElementById('netflixIntroEl'),ov=document.getElementById('introOverlay');
  if(!el||!ov)return;
  el.innerHTML=helper(1)+helper(2)+helper(3)+helper(4);
  document.body.style.overflow='hidden';
  const L=['N','E','T','F','L','I','X'];let i=0;
  const cy=setInterval(()=>{i++;if(i<L.length)el.setAttribute('letter',L[i]);else clearInterval(cy);},380);
  setTimeout(()=>{
    ov.classList.add('fade-out');
    setTimeout(()=>{ov.remove();document.body.style.overflow='';},650);
  },4200);
})();

/* ===== App ===== */
const TMDB_KEY='b1941699110de014fceb3d15828f4718';
const BASE='https://api.themoviedb.org/3';
const IMDB_BASE='https://api.imdbapi.dev';
const IMG_POSTER='https://image.tmdb.org/t/p/w400';
const IMG_BACKDROP='https://image.tmdb.org/t/p/w1280';
const IMG_BACKDROP_SM='https://image.tmdb.org/t/p/w780';

async function tmdb(path,params={}){
  const url=new URL(BASE+path);
  url.searchParams.set('api_key',TMDB_KEY);
  url.searchParams.set('language','en-US');
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  let res=await fetch(url);
  if(res.status===429){const w=Number(res.headers.get('Retry-After')||1)*1000;await new Promise(r=>setTimeout(r,w));res=await fetch(url);}
  if(!res.ok)throw new Error('TMDB '+res.status);
  return res.json();
}

const imgUrl=(path,size)=>path?size+path:null;

/* ===== Continue Watching ===== */
const CW_KEY='cw_list';
function getCW(){return JSON.parse(localStorage.getItem(CW_KEY)||'[]');}
function setCW(list){localStorage.setItem(CW_KEY,JSON.stringify(list));}

function addToCW(item){
  let list=getCW().filter(i=>!(i.id===item.id&&i.media_type===item.media_type));
  list.unshift({...item,watchedAt:Date.now(),progress:item.progress||Math.floor(Math.random()*70)+5});
  setCW(list.slice(0,20));
  renderCWRow();
}
function removeFromCW(id,type){
  setCW(getCW().filter(i=>!(i.id===id&&i.media_type===type)));
  renderCWRow();
}

function renderCWRow(){
  let row=document.getElementById('row-cw');
  const rowsContainer=document.getElementById('rows');
  const list=getCW();
  if(!row){
    row=document.createElement('div');
    row.className='row';row.id='row-cw';
    row.innerHTML=`<div class="row-head"><div class="row-title">Continue Watching</div></div><div class="row-track"></div>`;
    rowsContainer.insertBefore(row,rowsContainer.firstChild);
  }
  row.style.display=list.length?'':'none';
  const track=row.querySelector('.row-track');
  track.innerHTML='';
  list.forEach(item=>{
    const type=item.media_type;
    const card=document.createElement('div');
    card.className='cw-card';
    const thumb=imgUrl(item.backdrop_path||item.poster_path,IMG_BACKDROP_SM);
    const pct=Math.min(Math.max(item.progress||10,5),95);
    card.innerHTML=`
      <div class="cw-thumb">
        ${thumb?`<img loading="lazy" src="${thumb}" alt="${item.title||item.name}">`:'<div class="cw-thumb-fallback">'+(item.title||item.name)+'</div>'}
        <div class="cw-play-overlay">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="cw-progress-bar"><div class="cw-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="cw-info">
        <div class="cw-title">${item.title||item.name||'Untitled'}</div>
        <div class="cw-sub">${type==='tv'?(item.lastEp||'Season 1'):'Movie'} · ${pct}% watched</div>
      </div>
      <button class="cw-remove" title="Remove" data-id="${item.id}" data-type="${type}">✕</button>`;
    card.querySelector('.cw-play-overlay').addEventListener('click',()=>{
      const url=type==='movie'?`https://vidfast.pro/movie/${item.id}`:`https://vidfast.pro/tv/${item.id}/1/1`;
      openPlayer(url,item.title||item.name);
    });
    card.querySelector('.cw-remove').addEventListener('click',(e)=>{
      e.stopPropagation();removeFromCW(item.id,type);
    });
    card.addEventListener('click',(e)=>{if(!e.target.closest('.cw-remove')&&!e.target.closest('.cw-play-overlay'))openModal(item.id,type);});
    track.appendChild(card);
  });
}

/* ===== Watchlist ===== */
const WL_KEY='velvet_watchlist';
const getWL=()=>JSON.parse(localStorage.getItem(WL_KEY)||'[]');
const setWL=list=>localStorage.setItem(WL_KEY,JSON.stringify(list));
const inWL=(id,type)=>getWL().some(i=>i.id===id&&i.media_type===type);
function toggleWL(item){
  let list=getWL();
  const ex=list.some(i=>i.id===item.id&&i.media_type===item.media_type);
  if(ex){list=list.filter(i=>!(i.id===item.id&&i.media_type===item.media_type));showToast('Removed from My List');}
  else{list.unshift(item);showToast('Added to My List');}
  setWL(list);renderMyListRow();return!ex;
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ===== Player ===== */
function openPlayer(url,label,cwItem){
  const popup=document.getElementById('playerPopup');
  document.getElementById('playerIframe').src=url;
  document.getElementById('playerLabel').textContent=label||'';
  popup.classList.add('show');
  document.body.style.overflow='hidden';
  if(cwItem)addToCW(cwItem);
}
function closePlayer(){
  const popup=document.getElementById('playerPopup');
  popup.classList.remove('show');
  document.getElementById('playerIframe').src='';
  if(!document.getElementById('modalBackdrop').classList.contains('show'))document.body.style.overflow='';
}
document.getElementById('playerClose').addEventListener('click',closePlayer);
document.getElementById('playerPopup').addEventListener('click',e=>{if(e.target.id==='playerPopup')closePlayer();});
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('playerPopup').classList.contains('show'))closePlayer();
    else if(document.getElementById('exploreOverlay').classList.contains('show'))closeExplore();
  }
});

/* ===== Cards/Rows ===== */
const mTitle=i=>i.title||i.name||'Untitled';
const mYear=i=>{const d=i.release_date||i.first_air_date;return d?d.slice(0,4):'—';};
const mType=i=>i.media_type||(i.first_air_date?'tv':'movie');

function cardEl(item){
  const type=mType(item);
  const card=document.createElement('div');card.className='card';
  const p=imgUrl(item.poster_path,IMG_POSTER);
  card.innerHTML=p?`<img loading="lazy" src="${p}" alt="${mTitle(item)}">`:`<div class="card-fallback">${mTitle(item)}</div>`;
  const meta=document.createElement('div');meta.className='card-meta';
  meta.innerHTML=`<div>${mTitle(item)}</div><div><span class="r">★ ${item.vote_average?item.vote_average.toFixed(1):'–'}</span> · ${mYear(item)}</div>`;
  card.appendChild(meta);
  card.addEventListener('click',()=>openModal(item.id,type));
  return card;
}

function skel(track,n=8){for(let i=0;i<n;i++){const s=document.createElement('div');s.className='skel';track.appendChild(s);}}

function buildRowShell(title,rowId){
  const rows=document.getElementById('rows');
  const row=document.createElement('div');row.className='row';row.id=rowId;
  row.innerHTML=`<div class="row-head"><div class="row-title">${title}</div></div><div class="row-track"></div>`;
  rows.appendChild(row);
  const track=row.querySelector('.row-track');skel(track);return track;
}

function fillTrack(track,items,fb){
  track.innerHTML='';
  if(!items.length){track.parentElement.style.display='none';return;}
  items.forEach(item=>{if(!item.media_type)item.media_type=fb;track.appendChild(cardEl(item));});
}

async function loadRow(title,rowId,fetcher,fb){
  const track=buildRowShell(title,rowId);
  try{const d=await fetcher();fillTrack(track,d.results||[],fb);}
  catch(e){track.innerHTML=`<div class="empty-row">Couldn't load this row right now.</div>`;}
}

function renderMyListRow(){
  let row=document.getElementById('row-mylist');
  const rc=document.getElementById('rows');const list=getWL();
  if(!row){
    row=document.createElement('div');row.className='row';row.id='row-mylist';row.style.display='none';
    row.innerHTML=`<div class="row-head"><div class="row-title">My List</div></div><div class="row-track"></div>`;
    rc.insertBefore(row,rc.firstChild);
  }
  const track=row.querySelector('.row-track');track.innerHTML='';
  if(!list.length)track.innerHTML=`<div class="empty-row">Titles you save will show up here.</div>`;
  else list.forEach(item=>track.appendChild(cardEl(item)));
  row.style.display=(currentCategory==='mylist')?'':'none';
}

/* ===== Hero ===== */
let heroItems=[],heroIndex=0,heroTimer=null;
async function loadHero(){
  const d=await tmdb('/trending/all/week');
  heroItems=(d.results||[]).filter(i=>i.backdrop_path).slice(0,5);
  if(!heroItems.length)return;
  const sw=document.getElementById('heroSlides'),dw=document.getElementById('heroDots');
  heroItems.forEach((item,i)=>{
    const sl=document.createElement('div');sl.className='hero-slide'+(i===0?' active':'');
    sl.style.backgroundImage=`url(${imgUrl(item.backdrop_path,IMG_BACKDROP)})`;sl.dataset.index=i;sw.appendChild(sl);
    const dot=document.createElement('button');if(i===0)dot.className='active';
    dot.addEventListener('click',()=>setHero(i));dw.appendChild(dot);
  });
  setHero(0);heroTimer=setInterval(()=>setHero((heroIndex+1)%heroItems.length),8000);
}

function setHero(i){
  heroIndex=i;const item=heroItems[i];if(!item)return;
  document.querySelectorAll('.hero-slide').forEach((s,idx)=>s.classList.toggle('active',idx===i));
  document.querySelectorAll('#heroDots button').forEach((d,idx)=>d.classList.toggle('active',idx===i));
  document.getElementById('heroTitle').textContent=mTitle(item);
  document.getElementById('heroOverview').textContent=item.overview||'';
  document.getElementById('heroMeta').innerHTML=`<span class="rating">★ ${item.vote_average?item.vote_average.toFixed(1):'–'}</span><span>${mYear(item)}</span><span>${mType(item)==='tv'?'Series':'Film'}</span>`;
  document.getElementById('heroPlayBtn').onclick=()=>openModal(item.id,mType(item),{autoplayTrailer:true});
  document.getElementById('heroInfoBtn').onclick=()=>openModal(item.id,mType(item));
}

/* ===== Modal ===== */
async function openModal(id,type,opts={}){
  const bd=document.getElementById('modalBackdrop'),modal=document.getElementById('modal');
  modal.innerHTML=`<div class="modal-drag-handle" id="modalDragHandle"><div class="bar"></div></div><div class="modal-scroll" style="display:flex;align-items:center;justify-content:center;"><div style="padding:80px;text-align:center;color:var(--text-dim);">Loading…</div></div>`;
  bd.classList.add('show');document.body.style.overflow='hidden';
  try{
    const data=await tmdb(`/${type}/${id}`,{append_to_response:'videos,credits'});
    const title=data.title||data.name;
    const year=(data.release_date||data.first_air_date||'').slice(0,4);
    const runtime=type==='movie'?(data.runtime?`${data.runtime} min`:null):(data.number_of_seasons?`${data.number_of_seasons} season${data.number_of_seasons>1?'s':''}`:null);
    const genres=(data.genres||[]).map(g=>g.name);
    const cast=(data.credits?.cast||[]).slice(0,5).map(c=>c.name).join(', ');
    const trailer=(data.videos?.results||[]).find(v=>v.site==='YouTube'&&v.type==='Trailer')||(data.videos?.results||[]).find(v=>v.site==='YouTube');
    const bdUrl=imgUrl(data.backdrop_path,IMG_BACKDROP_SM);
    const listed=inWL(id,type);
    const seasons=type==='tv'?(data.seasons||[]).filter(s=>s.season_number!==0||data.seasons.length===1):[];
    const playerUrl=type==='movie'?`https://vidfast.pro/movie/${id}`:`https://vidfast.pro/tv/${id}/1/1`;
    const cwItem={id,media_type:type,title,poster_path:data.poster_path,backdrop_path:data.backdrop_path,vote_average:data.vote_average,release_date:data.release_date,first_air_date:data.first_air_date};

    modal.innerHTML=`
      <div class="modal-drag-handle" id="modalDragHandle"><div class="bar"></div></div>
      <div class="modal-scroll">
        <div class="modal-hero" style="${bdUrl?`background-image:url(${bdUrl})`:'background:#1c1c1f'}">
          <button class="modal-close" id="modalCloseBtn">✕</button>
          <div class="modal-title-wrap"><div class="modal-title">${title}</div></div>
        </div>
        <div class="modal-body">
          <div class="modal-meta">
            <span style="color:var(--gold);font-weight:700;">★ ${data.vote_average?data.vote_average.toFixed(1):'–'}</span>
            <span>${year||'—'}</span>
            ${runtime?`<span>${runtime}</span>`:''}
          </div>
          <div class="pills">${genres.map(g=>`<span class="pill">${g}</span>`).join('')}</div>
          <div class="modal-actions">
            <button class="btn btn-play" id="watchNowBtn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              ${type==='tv'?'Play S1 E1':'Play'}
            </button>
            <button class="btn btn-primary" id="trailerBtn" ${trailer?'':'disabled style="opacity:.4;cursor:default;"'}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              ${trailer?'Trailer':'No Trailer'}
            </button>
            <button class="btn btn-ghost" id="watchlistBtn">${listed?'✓ In My List':'+ My List'}</button>
          </div>
          <div class="trailer-frame" id="trailerFrame"></div>
          <p class="modal-overview">${data.overview||'No description available.'}</p>
          ${cast?`<div class="cast-label">Cast</div><div class="cast-list">${cast}</div>`:''}
          ${type==='tv'&&seasons.length?`
          <div class="episodes-wrap">
            <div class="episodes-head">
              <div class="cast-label" style="margin-bottom:0;">Episodes</div>
              <select class="season-select" id="seasonSelect">${seasons.map(s=>`<option value="${s.season_number}">${s.name} · ${s.episode_count} ep${s.episode_count===1?'':'s'}</option>`).join('')}</select>
            </div>
            <div class="episode-list" id="episodeList"></div>
          </div>`:''}
          <div class="note">Streaming via vidfast.pro, a third-party source. Availability varies by region.</div>
        </div>
      </div>`;

    document.getElementById('modalCloseBtn').onclick=closeModal;
    document.getElementById('watchNowBtn').onclick=()=>{openPlayer(playerUrl,title,cwItem);};
    document.getElementById('watchlistBtn').onclick=e=>{
      const nowIn=toggleWL({id,media_type:type,title,poster_path:data.poster_path,vote_average:data.vote_average,release_date:data.release_date,first_air_date:data.first_air_date});
      e.target.textContent=nowIn?'✓ In My List':'+ My List';
    };
    if(trailer){
      const frame=document.getElementById('trailerFrame');
      const playTrailer=()=>{frame.classList.add('show');frame.innerHTML=`<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;};
      document.getElementById('trailerBtn').onclick=playTrailer;
      if(opts.autoplayTrailer)playTrailer();
    }
    if(type==='tv'&&seasons.length){
      const ss=document.getElementById('seasonSelect'),el=document.getElementById('episodeList');
      const loadEps=async sn=>{
        el.innerHTML=`<div class="episode-loading">Loading episodes…</div>`;
        try{
          const sd=await tmdb(`/tv/${id}/season/${sn}`);const eps=sd.episodes||[];
          el.innerHTML='';
          if(!eps.length){el.innerHTML=`<div class="episode-loading">No episode data.</div>`;return;}
          eps.forEach(ep=>{
            const still=imgUrl(ep.still_path,IMG_BACKDROP_SM);
            const div=document.createElement('div');div.className='episode-item';
            div.innerHTML=`
              <div class="episode-num">${ep.episode_number}</div>
              <div class="episode-still">
                ${still?`<img loading="lazy" src="${still}" alt="${ep.name}">`:''}
                <div class="episode-play-overlay" data-s="${sn}" data-e="${ep.episode_number}" data-t="${(ep.name||'Episode '+ep.episode_number).replace(/"/g,'')}">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </div>
              </div>
              <div class="episode-info">
                <div class="episode-title">${ep.name||'Episode '+ep.episode_number}</div>
                <div class="episode-meta">${ep.air_date||''}${ep.runtime?' · '+ep.runtime+' min':''}</div>
                <div class="episode-overview">${ep.overview||'No description.'}</div>
              </div>`;
            el.appendChild(div);
          });
          el.querySelectorAll('.episode-play-overlay').forEach(ov=>{
            ov.addEventListener('click',()=>{
              const s=ov.dataset.s,e=ov.dataset.e,t=ov.dataset.t;
              const epCwItem={...cwItem,lastEp:`S${s} E${e}`,progress:0};
              openPlayer(`https://vidfast.pro/tv/${id}/${s}/${e}`,`${title} · S${s} E${e} · ${t}`,epCwItem);
            });
          });
          const first=eps[0];
          if(first){
            const wb=document.getElementById('watchNowBtn');
            if(wb){wb.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play S${sn} E${first.episode_number}`;
            wb.onclick=()=>{openPlayer(`https://vidfast.pro/tv/${id}/${sn}/${first.episode_number}`,`${title} · S${sn} E${first.episode_number}`,{...cwItem,lastEp:`S${sn} E${first.episode_number}`});};
            }
          }
        }catch(e){el.innerHTML=`<div class="episode-loading">Couldn't load episodes.</div>`;}
      };
      ss.addEventListener('change',()=>loadEps(ss.value));loadEps(ss.value);
    }
  }catch(e){
    modal.innerHTML=`<div class="modal-drag-handle" id="modalDragHandle"><div class="bar"></div></div><div class="modal-scroll" style="display:flex;align-items:center;justify-content:center;"><div style="padding:60px;text-align:center;color:var(--text-dim);"><button class="modal-close" id="modalCloseBtn" style="position:static;display:inline-flex;margin-bottom:20px;">✕</button><br>Something went wrong.</div></div>`;
    document.getElementById('modalCloseBtn').onclick=closeModal;
  }
}

function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('show');
  document.getElementById('modalBackdrop').style.background='';
  const m=document.getElementById('modal');m.innerHTML='';m.style.transform='';m.style.transition='';
  if(!document.getElementById('playerPopup').classList.contains('show'))document.body.style.overflow='';
}
document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal();});

/* modal swipe */
let md={active:false,startY:0,deltaY:0};
document.addEventListener('pointerdown',e=>{const h=document.getElementById('modalDragHandle');if(h&&(e.target===h||h.contains(e.target))){md={active:true,startY:e.clientY,deltaY:0};document.getElementById('modal').style.transition='none';}});
document.addEventListener('pointermove',e=>{if(!md.active)return;const d=e.clientY-md.startY;if(d<0)return;md.deltaY=d;document.getElementById('modal').style.transform=`translateY(${d}px)`;document.getElementById('modalBackdrop').style.background=`rgba(0,0,0,${Math.max(0.7-d/500,0)})`;});
document.addEventListener('pointerup',()=>{if(!md.active)return;const m=document.getElementById('modal');m.style.transition='transform .25s ease';if(md.deltaY>120){m.style.transform='translateY(100%)';setTimeout(closeModal,200);}else{m.style.transform='translateY(0)';document.getElementById('modalBackdrop').style.background='';}md={active:false,startY:0,deltaY:0};});
document.addEventListener('pointercancel',()=>{md={active:false,startY:0,deltaY:0};});

/* ===== Explore Overlay with IMDb API & infinite scroll ===== */
let exploreFilter='trending',explorePage=1,exploreLoading=false,exploreHasMore=true,exploreObserver=null;

const IMDB_FILTERS={
  trending:{fn:()=>tmdb('/trending/all/week',{page:explorePage}),type:'multi'},
  movies:{fn:()=>tmdb('/movie/popular',{page:explorePage}),type:'movie'},
  tv:{fn:()=>tmdb('/tv/popular',{page:explorePage}),type:'tv'},
  top_rated:{fn:()=>tmdb('/movie/top_rated',{page:explorePage}),type:'movie'},
  action:{fn:()=>tmdb('/discover/movie',{with_genres:28,sort_by:'popularity.desc',page:explorePage}),type:'movie'},
  comedy:{fn:()=>tmdb('/discover/movie',{with_genres:35,sort_by:'popularity.desc',page:explorePage}),type:'movie'},
  scifi:{fn:()=>tmdb('/discover/movie',{with_genres:878,sort_by:'popularity.desc',page:explorePage}),type:'movie'},
  horror:{fn:()=>tmdb('/discover/movie',{with_genres:27,sort_by:'popularity.desc',page:explorePage}),type:'movie'},
  drama:{fn:()=>tmdb('/discover/movie',{with_genres:18,sort_by:'popularity.desc',page:explorePage}),type:'movie'},
  animation:{fn:()=>tmdb('/discover/movie',{with_genres:16,sort_by:'popularity.desc',page:explorePage}),type:'movie'},
};

function skelsN(n){let s='';for(let i=0;i<n;i++)s+=`<div class="explore-skel"></div>`;return s;}

async function loadExplorePage(){
  if(exploreLoading||!exploreHasMore)return;
  exploreLoading=true;
  const spinner=document.getElementById('exploreSpinner');spinner.style.display='block';
  try{
    const cfg=IMDB_FILTERS[exploreFilter];
    const data=await cfg.fn();
    const items=(data.results||[]).filter(i=>i.poster_path);
    const grid=document.getElementById('exploreGrid');
    if(data.page>=data.total_pages)exploreHasMore=false;
    items.forEach(item=>{
      const type=item.media_type||cfg.type||'movie';
      item.media_type=type;
      grid.appendChild(cardEl(item));
    });
    explorePage++;
  }catch(e){console.error('explore load error',e);}
  spinner.style.display='none';exploreLoading=false;
}

function resetExplore(){
  explorePage=1;exploreLoading=false;exploreHasMore=true;
  document.getElementById('exploreGrid').innerHTML='';
  loadExplorePage();
}

function openExplore(){
  const ov=document.getElementById('exploreOverlay');ov.classList.add('show');
  document.body.style.overflow='hidden';
  if(!exploreObserver){
    const trigger=document.getElementById('exploreLoadTrigger');
    exploreObserver=new IntersectionObserver(entries=>{if(entries[0].isIntersecting)loadExplorePage();},{root:document.getElementById('exploreScroll'),threshold:0.1});
    exploreObserver.observe(trigger);
  }
  resetExplore();
}
function closeExplore(){
  document.getElementById('exploreOverlay').classList.remove('show');
  if(!document.getElementById('playerPopup').classList.contains('show'))document.body.style.overflow='';
}

document.getElementById('exploreBtn').addEventListener('click',openExplore);
document.getElementById('exploreClose').addEventListener('click',closeExplore);

document.querySelectorAll('.explore-filter').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.explore-filter').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    exploreFilter=btn.dataset.filter;
    resetExplore();
  });
});

/* ===== Search ===== */
const searchToggle=document.getElementById('searchToggle');
const searchPanel=document.getElementById('searchPanel');
const searchInput=document.getElementById('searchInput');
const searchClearBtn=document.getElementById('searchClearBtn');
const recentWrap=document.getElementById('recentWrap');
const recentList=document.getElementById('recentList');
const clearRecentBtn=document.getElementById('clearRecentBtn');
const searchView=document.getElementById('searchView');
const rowsEl=document.getElementById('rows');
const heroEl=document.getElementById('hero');
const exploreBtnWrap=document.getElementById('exploreBtnWrap');

const RECENT_KEY='netflix_recent';
const getRecent=()=>JSON.parse(localStorage.getItem(RECENT_KEY)||'[]');
const setRecent=list=>localStorage.setItem(RECENT_KEY,JSON.stringify(list));

function addRecent(q){q=q.trim();if(!q)return;let l=getRecent().filter(i=>i.toLowerCase()!==q.toLowerCase());l.unshift(q);setRecent(l.slice(0,8));renderRecent();}
function renderRecent(){
  const list=getRecent();recentList.innerHTML='';
  if(!list.length){recentList.innerHTML=`<div class="recent-empty">Your recent searches will show up here.</div>`;return;}
  list.forEach(q=>{
    const item=document.createElement('div');item.className='recent-item';
    item.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>${q}</span>`;
    item.addEventListener('click',()=>{searchInput.value=q;searchClearBtn.style.display='flex';recentWrap.style.display='none';runSearch(q);});
    recentList.appendChild(item);
  });
}
function openSearch(){searchPanel.classList.add('open');searchToggle.classList.add('active');renderRecent();setTimeout(()=>searchInput.focus(),50);}
function closeSearch(){searchPanel.classList.remove('open');searchToggle.classList.remove('active');}
searchToggle.addEventListener('click',e=>{e.stopPropagation();searchPanel.classList.contains('open')?closeSearch():openSearch();});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))closeSearch();});
let sd;
searchInput.addEventListener('input',()=>{
  clearTimeout(sd);const q=searchInput.value.trim();
  searchClearBtn.style.display=q?'flex':'none';recentWrap.style.display=q?'none':'';
  if(!q){clearSearchView();return;}
  sd=setTimeout(()=>runSearch(q),400);
});
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(sd);const q=searchInput.value.trim();if(q)runSearch(q);}else if(e.key==='Escape')closeSearch();});
searchClearBtn.addEventListener('click',e=>{e.stopPropagation();searchInput.value='';searchClearBtn.style.display='none';recentWrap.style.display='';clearSearchView();searchInput.focus();renderRecent();});
clearRecentBtn.addEventListener('click',e=>{e.stopPropagation();setRecent([]);renderRecent();});

function clearSearchView(){searchView.classList.remove('show');heroEl.style.display='';rowsEl.style.display='';exploreBtnWrap.style.display='';}
async function runSearch(query){
  addRecent(query);heroEl.style.display='none';rowsEl.style.display='none';exploreBtnWrap.style.display='none';
  searchView.classList.add('show');
  const heading=document.getElementById('searchHeading');const grid=document.getElementById('searchGrid');
  heading.textContent=`Results for "${query}"`;grid.innerHTML='';
  try{
    const d=await tmdb('/search/multi',{query,include_adult:'false'});
    const res=(d.results||[]).filter(r=>r.media_type==='movie'||r.media_type==='tv');
    if(!res.length){grid.innerHTML=`<div class="empty-row">No titles matched "${query}".</div>`;return;}
    res.forEach(item=>grid.appendChild(cardEl(item)));
  }catch(e){grid.innerHTML=`<div class="empty-row">Search failed — try again.</div>`;}
}

/* ===== Category filter ===== */
let currentCategory='home';
function applyCategory(cat){
  currentCategory=cat;
  document.querySelectorAll('.nav-links a').forEach(l=>l.classList.toggle('active',l.dataset.cat===cat));
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  clearSearchView();searchInput.value='';closeSearch();
  document.querySelectorAll('.row').forEach(r=>r.style.display='');
  const ml=document.getElementById('row-mylist');if(ml)ml.style.display='none';
  const cw=document.getElementById('row-cw');
  if(cat==='movies'){document.querySelectorAll('.row').forEach(r=>{if(r.id.includes('tv'))r.style.display='none';});if(cw)cw.style.display='none';}
  else if(cat==='tv'){document.querySelectorAll('.row').forEach(r=>{if(!r.id.includes('tv')&&r.id!=='row-mylist'&&r.id!=='row-cw')r.style.display='none';});}
  else if(cat==='mylist'){document.querySelectorAll('.row').forEach(r=>{if(r.id!=='row-mylist')r.style.display='none';});if(ml)ml.style.display='';}
  window.scrollTo({top:cat==='home'?0:heroEl.offsetHeight-80,behavior:'smooth'});
}
document.querySelectorAll('.nav-links a').forEach(l=>l.addEventListener('click',e=>{e.preventDefault();applyCategory(l.dataset.cat);}));
document.querySelectorAll('.bottom-nav button').forEach(b=>b.addEventListener('click',()=>applyCategory(b.dataset.cat)));
document.getElementById('logoBtn').addEventListener('click',()=>applyCategory('home'));

/* ===== Top 10 ===== */
async function loadTop10(){
  const rc=document.getElementById('rows');const row=document.createElement('div');
  row.className='row';row.id='row-top10';
  row.innerHTML=`<div class="row-head"><div class="row-title">Top 10 Today</div></div><div class="row-track top10-track"></div>`;
  rc.appendChild(row);const track=row.querySelector('.row-track');skel(track,10);
  try{
    const d=await tmdb('/trending/all/day');
    const items=(d.results||[]).filter(i=>i.poster_path).slice(0,10);
    track.innerHTML='';
    items.forEach((item,idx)=>{
      if(!item.media_type)item.media_type=item.first_air_date?'tv':'movie';
      const wrap=document.createElement('div');wrap.className='top10-item';
      const rank=document.createElement('div');rank.className='top10-rank';rank.textContent=idx+1;
      wrap.appendChild(rank);wrap.appendChild(cardEl(item));track.appendChild(wrap);
    });
  }catch(e){track.innerHTML=`<div class="empty-row">Couldn't load Top 10.</div>`;}
}

/* ===== Boot ===== */
async function init(){
  renderCWRow();
  renderMyListRow();
  loadTop10();
  loadHero();
  loadRow('Trending Now','row-trending',()=>tmdb('/trending/all/week'),'movie');
  loadRow('Popular Movies','row-popmovies',()=>tmdb('/movie/popular'),'movie');
  loadRow('Popular TV Shows','row-tvpopular',()=>tmdb('/tv/popular'),'tv');
  loadRow('Top Rated Films','row-topmovies',()=>tmdb('/movie/top_rated'),'movie');
  loadRow('Critically Acclaimed Series','row-tvtop',()=>tmdb('/tv/top_rated'),'tv');
  loadRow('Action & Adventure','row-action',()=>tmdb('/discover/movie',{with_genres:28,sort_by:'popularity.desc'}),'movie');
  loadRow('Sci-Fi & Fantasy','row-scifi',()=>tmdb('/discover/movie',{with_genres:878,sort_by:'popularity.desc'}),'movie');
  loadRow('Comedies','row-comedy',()=>tmdb('/discover/movie',{with_genres:35,sort_by:'popularity.desc'}),'movie');
  loadRow('Horror','row-horror',()=>tmdb('/discover/movie',{with_genres:27,sort_by:'popularity.desc'}),'movie');
  loadRow('Animation','row-animation',()=>tmdb('/discover/movie',{with_genres:16,sort_by:'popularity.desc'}),'movie');
}
init();
</script>
