<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Netflix — Streaming UI (TMDB)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c;
    --bg-elev:#141416;
    --card:#1c1c1f;
    --card-hover:#232327;
    --text:#f3f1ec;
    --text-dim:#9a9a9e;
    --text-faint:#5e5e63;
    --accent:#e0263b;
    --accent-dim:#9c1a29;
    --gold:#f5c451;
    --border:rgba(255,255,255,0.08);
    --shadow:0 20px 60px rgba(0,0,0,0.55);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent); color:#fff;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  img{display:block; max-width:100%;}

  /* ---------- sprocket / filmstrip motif ---------- */
  .sprocket{display:flex; gap:7px; align-items:center;}
  .sprocket span{width:5px; height:5px; border-radius:50%; background:var(--accent); opacity:.55;}
  .sprocket.long span{width:4px;height:4px;}

  /* ---------- Nav ---------- */
  .nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 4vw;
    transition:background .35s ease, padding .35s ease, box-shadow .35s ease;
  }
  .nav.scrolled{
    background:rgba(20,20,24,0.4);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    box-shadow:0 4px 24px rgba(0,0,0,.25);
    padding:10px 4vw;
  }
  .logo{
    font-family:'Bebas Neue', sans-serif;
    font-size:28px; letter-spacing:4px; color:var(--accent);
    display:flex; align-items:center; gap:8px; cursor:pointer;
  }
  .nav-links{display:flex; gap:26px; font-size:14px; font-weight:500; color:var(--text-dim);}
  .nav-links a{transition:color .2s;}
  .nav-links a:hover, .nav-links a.active{color:var(--text);}
  .nav-right{display:flex; align-items:center; gap:18px;}
  .search-wrap{display:flex; align-items:center; position:relative;}
  .icon-btn{
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:50%; color:var(--text); opacity:.85; transition:opacity .2s, background .2s;
  }
  .icon-btn:hover{opacity:1; background:rgba(255,255,255,.08);}
  .icon-btn.active{background:rgba(255,255,255,.1); opacity:1;}
  .search-panel{
    position:absolute; top:calc(100% + 12px); right:0; width:360px; max-width:88vw;
    background:rgba(18,18,21,0.95);
    backdrop-filter:blur(26px) saturate(160%);
    -webkit-backdrop-filter:blur(26px) saturate(160%);
    border:1px solid var(--border); border-radius:16px;
    padding:16px; box-shadow:var(--shadow);
    opacity:0; transform:translateY(-8px) scale(.98);
    pointer-events:none; transition:opacity .2s ease, transform .2s ease;
  }
  .search-panel.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
  .search-field{
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.08); border:1px solid var(--border); border-radius:12px;
    padding:12px 16px; transition:border-color .2s, background .2s;
  }
  .search-field:focus-within{border-color:var(--accent); background:rgba(255,255,255,.12);}
  .search-field svg{flex-shrink:0; color:var(--text-dim);}
  .search-field input{flex:1; background:none; border:none; color:var(--text); font-size:15px; outline:none;}
  .search-field input::placeholder{color:var(--text-faint);}
  .search-clear{
    flex-shrink:0; color:var(--text-faint); font-size:15px; line-height:1;
    width:20px; height:20px; display:none; align-items:center; justify-content:center; border-radius:50%;
  }
  .search-clear:hover{color:var(--text); background:rgba(255,255,255,.08);}
  .recent-wrap{margin-top:16px;}
  .recent-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; padding:0 2px;}
  .recent-head span{font-size:11px; text-transform:uppercase; letter-spacing:1.4px; color:var(--text-faint); font-weight:700;}
  .recent-head button{font-size:11px; color:var(--text-dim);}
  .recent-head button:hover{color:var(--text);}
  .recent-list{display:flex; flex-direction:column; gap:1px; max-height:280px; overflow-y:auto;}
  .recent-item{
    display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:9px;
    font-size:14px; color:var(--text-dim); cursor:pointer; transition:background .15s, color .15s;
  }
  .recent-item:hover{background:rgba(255,255,255,.08); color:var(--text);}
  .recent-item svg{width:14px; height:14px; flex-shrink:0; color:var(--text-faint);}
  .recent-empty{font-size:12px; color:var(--text-faint); padding:8px 2px;}

  /* ---------- Hero ---------- */
  .hero{
    position:relative; height:92vh; min-height:560px; width:100%;
    display:flex; flex-direction:column; justify-content:flex-end;
    overflow:hidden;
  }
  .hero-slide{
    position:absolute; inset:0; opacity:0; transition:opacity 1.2s ease;
    background-size:cover; background-position:top center;
  }
  .hero-slide.active{opacity:1;}
  .hero-scrim{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(10,10,12,0.15) 0%, rgba(10,10,12,0.05) 30%, rgba(10,10,12,0.85) 82%, var(--bg) 100%),
      linear-gradient(90deg, rgba(10,10,12,0.75) 0%, rgba(10,10,12,0.15) 48%, rgba(10,10,12,0.05) 70%);
  }
  .hero-content{position:relative; z-index:2; padding:0 4vw 64px; max-width:680px;}
  .hero-title{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(40px, 7vw, 84px);
    line-height:1.02; letter-spacing:1px;
    text-shadow:0 8px 30px rgba(0,0,0,.5);
  }
  .hero-rule{margin:16px 0 18px;}
  .hero-meta{
    display:flex; gap:14px; align-items:center; font-size:13px; color:var(--text-dim);
    margin-bottom:16px; flex-wrap:wrap;
  }
  .hero-meta .rating{color:var(--gold); font-weight:700;}
  .hero-overview{
    color:var(--text-dim); font-size:15px; line-height:1.6;
    max-width:560px; margin-bottom:24px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .hero-actions{display:flex; gap:12px; flex-wrap:wrap;}
  .btn{
    display:flex; align-items:center; gap:8px;
    padding:12px 24px; border-radius:6px; font-weight:700; font-size:14.5px;
    transition:transform .15s ease, background .2s, opacity .2s;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--text); color:#000;}
  .btn-primary:hover{background:#d8d6d0;}
  .btn-ghost{background:rgba(120,120,130,0.35); color:var(--text); backdrop-filter:blur(6px);}
  .btn-ghost:hover{background:rgba(120,120,130,0.5);}
  .hero-dots{position:absolute; bottom:18px; right:4vw; z-index:3; display:flex; gap:8px;}
  .hero-dots button{
    width:22px; height:3px; background:rgba(255,255,255,.3); border-radius:2px; transition:background .25s, width .25s;
  }
  .hero-dots button.active{background:var(--accent); width:34px;}

  /* ---------- Rows ---------- */
  .rows{position:relative; z-index:2; margin-top:48px; padding-bottom:60px;}
  .row{margin-bottom:38px;}
  .row-head{display:flex; align-items:baseline; gap:10px; padding:0 4vw; margin-bottom:12px;}
  .row-title{font-size:18px; font-weight:800; letter-spacing:.3px;}
  .row-track{
    display:flex; gap:10px; overflow-x:auto; padding:4px 4vw 18px;
    scroll-snap-type:x proximity; scrollbar-width:none;
  }
  .row-track::-webkit-scrollbar{display:none;}
  .top10-track{padding-left:9vw;}
  .top10-item{display:flex; align-items:flex-end; flex:0 0 auto; scroll-snap-align:start;}
  .top10-rank{
    font-family:'Bebas Neue', sans-serif; font-size:128px; line-height:0.72;
    color:transparent; -webkit-text-stroke:2px var(--text-faint);
    margin-right:-30px; position:relative; top:18px; user-select:none; pointer-events:none;
  }
  .card{
    position:relative; flex:0 0 auto; width:170px; aspect-ratio:2/3;
    border-radius:8px; overflow:hidden; background:var(--card);
    scroll-snap-align:start; cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease, z-index 0s;
    border:1px solid var(--border);
  }
  .card:hover{
    transform:scale(1.08) translateY(-6px); z-index:5;
    box-shadow:var(--shadow), 0 0 0 2px var(--accent);
  }
  .card img{width:100%; height:100%; object-fit:cover;}
  .card-fallback{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:10px; font-size:13px; color:var(--text-dim);
    background:linear-gradient(160deg, #232327, #16161a);
  }
  .card-meta{
    position:absolute; left:0; right:0; bottom:0; padding:8px;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.92));
    opacity:0; transition:opacity .2s; font-size:11.5px;
  }
  .card:hover .card-meta{opacity:1;}
  .card-meta .r{color:var(--gold); font-weight:700;}
  .skel{
    flex:0 0 auto; width:170px; aspect-ratio:2/3; border-radius:8px;
    background:linear-gradient(100deg, var(--card) 30%, var(--card-hover) 50%, var(--card) 70%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  /* ---------- My List empty state ---------- */
  .empty-row{padding:0 4vw; color:var(--text-faint); font-size:13.5px;}

  /* ---------- Continue Watching row header with clear button ---------- */
  .row-head-actions{display:flex; align-items:center; gap:10px; margin-left:auto;}
  .clear-cw-btn{
    font-size:12px; color:var(--text-faint); font-weight:600;
    padding:4px 10px; border-radius:20px; border:1px solid var(--border);
    transition:color .2s, border-color .2s, background .2s;
  }
  .clear-cw-btn:hover{color:var(--text); border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.06);}

  /* ---------- Search results grid ---------- */
  .search-view{display:none; padding:120px 4vw 60px;}
  .search-view.show{display:block;}
  .search-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:16px;}
  .search-heading{font-size:22px; font-family:'Bebas Neue'; letter-spacing:1px; margin-bottom:18px;}

  /* ---------- Explore View ---------- */
  .explore-view{
    display:none; position:fixed; inset:0; z-index:90;
    background:var(--bg); overflow-y:auto;
    padding-bottom:80px;
  }
  .explore-view.show{display:block;}
  .explore-header{
    position:sticky; top:0; z-index:10;
    background:rgba(10,10,12,0.85);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    border-bottom:1px solid var(--border);
    padding:18px 4vw 14px;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  }
  .explore-header-left{display:flex; align-items:center; gap:12px; flex:1;}
  .explore-back{
    width:36px; height:36px; border-radius:50%;
    background:rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center;
    transition:background .2s; flex-shrink:0;
  }
  .explore-back:hover{background:rgba(255,255,255,.15);}
  .explore-title-text{font-family:'Bebas Neue'; font-size:26px; letter-spacing:2px; color:var(--text);}
  .explore-filters{display:flex; gap:8px; flex-wrap:wrap;}
  .filter-pill{
    padding:6px 14px; border-radius:20px; font-size:13px; font-weight:600;
    border:1px solid var(--border); color:var(--text-dim);
    transition:color .2s, border-color .2s, background .2s;
    white-space:nowrap;
  }
  .filter-pill:hover{color:var(--text); border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.06);}
  .filter-pill.active{color:#fff; background:var(--accent); border-color:var(--accent);}
  .explore-sort{
    background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px;
    padding:7px 12px; font-size:13px; font-family:inherit; cursor:pointer;
  }
  .explore-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:14px;
    padding:24px 4vw 0;
  }
  /* Explore cards are full-width in grid (not flex) */
  .explore-grid .card{
    width:100%; flex:none; scroll-snap-align:unset;
  }
  .explore-grid .card:hover{
    transform:scale(1.04) translateY(-4px);
  }
  .explore-skel{
    width:100%; aspect-ratio:2/3; border-radius:8px;
    background:linear-gradient(100deg, var(--card) 30%, var(--card-hover) 50%, var(--card) 70%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
  }
  .explore-loader{
    display:flex; justify-content:center; align-items:center;
    gap:8px; padding:32px; color:var(--text-faint); font-size:13px;
  }
  .explore-loader-dot{
    width:6px; height:6px; border-radius:50%; background:var(--accent);
    animation:bounceDot .9s infinite ease-in-out;
  }
  .explore-loader-dot:nth-child(2){animation-delay:.15s;}
  .explore-loader-dot:nth-child(3){animation-delay:.3s;}
  @keyframes bounceDot{0%,80%,100%{transform:scale(0.6); opacity:.4;} 40%{transform:scale(1); opacity:1;}}
  .explore-end{text-align:center; padding:24px; color:var(--text-faint); font-size:13px;}
  .explore-count{font-size:12px; color:var(--text-faint); padding:0 4vw 6px;}

  /* ---------- Explore trigger button (bottom of page) ---------- */
  .explore-trigger-wrap{
    display:flex; justify-content:center; padding:40px 4vw 20px;
    position:relative; z-index:2;
  }
  .explore-trigger-btn{
    display:flex; align-items:center; gap:10px;
    padding:16px 36px; border-radius:8px;
    background:var(--card); border:1px solid var(--border);
    color:var(--text); font-size:15px; font-weight:700;
    transition:background .2s, border-color .2s, transform .15s, box-shadow .2s;
    letter-spacing:.5px;
  }
  .explore-trigger-btn:hover{
    background:var(--card-hover); border-color:rgba(255,255,255,.2);
    transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,.4);
  }
  .explore-trigger-btn:active{transform:translateY(0);}
  .explore-trigger-btn svg{color:var(--accent);}

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200;
    display:none; align-items:flex-end; justify-content:center;
    padding:0; transition:background .2s ease; touch-action:none;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    width:100%; max-width:100%; height:98vh; max-height:98vh;
    background:var(--bg-elev);
    border-radius:24px 24px 0 0; overflow:hidden; box-shadow:var(--shadow);
    border:1px solid var(--border); border-bottom:none;
    display:flex; flex-direction:column;
    animation:riseUp .32s cubic-bezier(.22,.8,.25,1);
    touch-action:none;
  }
  @keyframes riseUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
  @keyframes slideDown{from{transform:translateY(0);} to{transform:translateY(100%);}}
  .modal.closing{animation:slideDown .32s cubic-bezier(.22,.8,.25,1) forwards;}
  .modal-drag-handle{
    flex-shrink:0; display:flex; justify-content:center; padding:14px 0 10px;
    cursor:grab; touch-action:none; user-select:none;
  }
  .modal-drag-handle .bar{width:48px; height:5px; border-radius:3px; background:var(--text-faint); opacity:.5;}
  .modal-scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .modal-hero{position:relative; aspect-ratio:16/8; background-size:cover; background-position:center;}
  .modal-hero::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(10,10,12,.1), var(--bg-elev) 95%);
  }
  .modal-close{
    position:absolute; top:14px; right:14px; z-index:5;
    width:34px; height:34px; border-radius:50%; background:rgba(10,10,12,.75);
    display:flex; align-items:center; justify-content:center; font-size:18px;
    cursor:pointer; transition:background .2s;
  }
  .modal-close:hover{background:rgba(10,10,12,.9);}
  .modal-title-wrap{position:absolute; bottom:18px; left:28px; right:28px; z-index:2;}
  .modal-title{font-family:'Bebas Neue'; font-size:clamp(28px,5vw,42px); letter-spacing:1px;}
  .modal-body{padding:10px 28px 32px;}
  .modal-actions{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center;}
  .modal-meta{display:flex; gap:14px; flex-wrap:wrap; font-size:13px; color:var(--text-dim); margin-bottom:14px;}
  .pill{border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--text-dim);}
  .pills{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .modal-overview{color:var(--text-dim); line-height:1.65; font-size:14.5px; margin-bottom:18px;}
  .cast-label{font-size:12px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px;}
  .cast-list{font-size:13.5px; color:var(--text-dim); margin-bottom:18px;}
  .trailer-frame{
    position:relative; width:100%; aspect-ratio:16/9; border-radius:8px; overflow:hidden;
    background:#000; margin-top:6px; display:none;
  }
  .trailer-frame.show{display:block;}
  .trailer-frame iframe{width:100%; height:100%; border:0;}
  .player-frame{
    position:relative; width:100%; aspect-ratio:16/9; border-radius:8px; overflow:hidden;
    background:#000; margin-top:6px; display:none;
  }
  .player-frame.show{display:block;}
  .player-frame iframe{width:100%; height:100%; border:0;}
  .season-select{
    background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px;
    padding:8px 12px; font-size:13px; font-family:inherit;
  }
  .note{
    font-size:11.5px; color:var(--text-faint); margin-top:18px; line-height:1.5;
    border-top:1px solid var(--border); padding-top:14px;
  }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#fff; color:#000; padding:11px 20px; border-radius:8px; font-size:13.5px; font-weight:600;
    opacity:0; transition:opacity .25s, transform .25s; z-index:300; box-shadow:var(--shadow);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- Footer ---------- */
  .footer{
    padding:50px 4vw 80px; color:var(--text-faint); font-size:12px;
    display:flex; flex-direction:column; gap:10px; align-items:center; text-align:center;
    position:relative; z-index:2;
  }

  /* ---------- Mobile bottom nav ---------- */
  .bottom-nav{
    display:none;
    position:fixed; bottom:0; left:0; right:0; z-index:150;
    background:rgba(15,15,17,0.55);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    border-top:1px solid var(--border);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .bottom-nav button{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--text-dim); font-size:11px; font-weight:600;
    flex:1; padding:4px 0; transition:color .2s;
  }
  .bottom-nav button.active{color:var(--accent);}
  .bottom-nav svg{width:20px; height:20px;}

  @media (max-width:640px){
    .nav-links{display:none;}
    .hero{height:80vh;}
    .hero-content{padding:0 5vw 48px;}
    .card{width:128px;}
    .skel{width:128px;}
    .search-panel{width:86vw; right:-8px;}
    .top10-rank{font-size:78px; margin-right:-16px; top:10px;}
    .modal{height:96vh; border-radius:20px 20px 0 0;}
    .modal-title-wrap{left:18px; right:18px;}
    .modal-body{padding:8px 18px 26px;}
    body{padding-bottom:64px;}
    .bottom-nav{display:flex;}
    .toast{bottom:80px;}
    .explore-grid{grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:10px;}
  }
</style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="logo" id="logoBtn">Netflix</div>
  <div class="nav-links">
    <a href="#" class="active" data-cat="home">Home</a>
    <a href="#" data-cat="movies">Movies</a>
    <a href="#" data-cat="tv">TV Shows</a>
    <a href="#" data-cat="mylist">My List</a>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <button class="icon-btn" id="searchToggle" title="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>

<script>
/* =====================================================
   Netflix Enhanced (personal TMDB-powered streaming UI)
   ===================================================== */
const TMDB_KEY = 'b1941699110de014fceb3d15828f4718';
const BASE = 'https://api.themoviedb.org/3';
const IMG_POSTER = 'https://image.tmdb.org/t/p/w400';
const IMG_BACKDROP = 'https://image.tmdb.org/t/p/w1280';
const IMG_BACKDROP_SMALL = 'https://image.tmdb.org/t/p/w780';

async function tmdb(path, params = {}) {
  const url = new URL(BASE + path);
  url.searchParams.set('api_key', TMDB_KEY);
  url.searchParams.set('language', 'en-US');
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  let res = await fetch(url);
  if (res.status === 429) {
    const wait = Number(res.headers.get('Retry-After') || 1) * 1000;
    await new Promise(r => setTimeout(r, wait));
    res = await fetch(url);
  }
  if (!res.ok) throw new Error('TMDB request failed: ' + res.status);
  return res.json();
}

const img = (path, size) => path ? size + path : null;

/* ---- Watchlist ---- */
const WL_KEY = 'velvet_watchlist';
const getWatchlist = () => JSON.parse(localStorage.getItem(WL_KEY) || '[]');
const setWatchlist = (list) => localStorage.setItem(WL_KEY, JSON.stringify(list));
const isInWatchlist = (id, type) => getWatchlist().some(i => i.id === id && i.media_type === type);

/* ---- Continue Watching ---- */
const CW_KEY = 'netflix_continue_watching';
const getContinueWatching = () => JSON.parse(localStorage.getItem(CW_KEY) || '[]');
const setContinueWatching = (list) => localStorage.setItem(CW_KEY, JSON.stringify(list));
function addToContinueWatching(item) {
  let list = getContinueWatching();
  const exists = list.findIndex(i => i.id === item.id && i.media_type === item.media_type);
  if (exists >= 0) list.splice(exists, 1);
  list.unshift({ ...item, timestamp: Date.now() });
  setContinueWatching(list.slice(0, 20));
  renderContinueWatchingRow();
}

function clearContinueWatching() {
  setContinueWatching([]);
  renderContinueWatchingRow();
  showToast('Continue Watching cleared');
}

function toggleWatchlist(item) {
  let list = getWatchlist();
  const exists = list.some(i => i.id === item.id && i.media_type === item.media_type);
  if (exists) {
    list = list.filter(i => !(i.id === item.id && i.media_type === item.media_type));
    showToast('Removed from My List');
  } else {
    list.unshift(item);
    showToast('Added to My List');
  }
  setWatchlist(list);
  renderMyListRow();
  return !exists;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---- Card / Row rendering ---- */
function mediaTitle(item) { return item.title || item.name || 'Untitled'; }
function mediaYear(item) {
  const d = item.release_date || item.first_air_date;
  return d ? d.slice(0, 4) : '—';
}
function mediaType(item) { return item.media_type || (item.first_air_date ? 'tv' : 'movie'); }

function cardEl(item) {
  const type = mediaType(item);
  const card = document.createElement('div');
  card.className = 'card';
  const posterUrl = img(item.poster_path, IMG_POSTER);
  card.innerHTML = posterUrl
    ? `<img loading="lazy" src="${posterUrl}" alt="${mediaTitle(item)}">`
    : `<div class="card-fallback">${mediaTitle(item)}</div>`;
  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.innerHTML = `<div>${mediaTitle(item)}</div><div><span class="r">★ ${item.vote_average ? item.vote_average.toFixed(1) : '–'}</span> · ${mediaYear(item)}</div>`;
  card.appendChild(meta);
  card.addEventListener('click', () => openModal(item.id, type));
  return card;
}

function skeletonRow(track, n = 8) {
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'skel';
    track.appendChild(s);
  }
}

function buildRowShell(title, rowId, isTop10 = false) {
  const rows = document.getElementById('rows');
  const row = document.createElement('div');
  row.className = 'row';
  row.id = rowId;
  row.innerHTML = `
    <div class="row-head"><div class="row-title">${title}</div></div>
    <div class="row-track${isTop10 ? ' top10-track' : ''}"></div>`;
  rows.appendChild(row);
  const track = row.querySelector('.row-track');
  skeletonRow(track);
  return track;
}

function fillTrack(track, items, fallbackType, isTop10 = false) {
  track.innerHTML = '';
  if (!items.length) {
    track.parentElement.style.display = 'none';
    return;
  }
  items.forEach((item, index) => {
    if (!item.media_type) item.media_type = fallbackType;
    if (isTop10) {
      const wrapper = document.createElement('div');
      wrapper.className = 'top10-item';
      const rank = document.createElement('div');
      rank.className = 'top10-rank';
      rank.textContent = String(index + 1).padStart(2, '0');
      wrapper.appendChild(rank);
      wrapper.appendChild(cardEl(item));
      track.appendChild(wrapper);
    } else {
      track.appendChild(cardEl(item));
    }
  });
}

async function loadRow(title, rowId, fetcher, fallbackType, isTop10 = false) {
  const track = buildRowShell(title, rowId, isTop10);
  try {
    const data = await fetcher();
    fillTrack(track, data.results || [], fallbackType, isTop10);
  } catch (e) {
    track.innerHTML = `<div class="empty-row">Couldn't load this row right now.</div>`;
  }
}

function renderMyListRow() {
  let row = document.getElementById('row-mylist');
  const rowsContainer = document.getElementById('rows');
  const list = getWatchlist();
  if (!row) {
    row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-mylist';
    row.style.display = 'none';
    row.innerHTML = `<div class="row-head"><div class="row-title">My List</div></div><div class="row-track"></div>`;
    rowsContainer.insertBefore(row, rowsContainer.firstChild);
  }
  const track = row.querySelector('.row-track');
  track.innerHTML = '';
  if (!list.length) {
    track.innerHTML = `<div class="empty-row">Titles you save will show up here. Tap "+ My List" on anything to add it.</div>`;
  } else {
    list.forEach(item => track.appendChild(cardEl(item)));
  }
  row.style.display = (typeof currentCategory !== 'undefined' && currentCategory === 'mylist') ? '' : 'none';
}

function renderContinueWatchingRow() {
  let row = document.getElementById('row-continue-watching');
  const rowsContainer = document.getElementById('rows');
  const list = getContinueWatching();

  if (!row && list.length > 0) {
    row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-continue-watching';
    row.innerHTML = `
      <div class="row-head">
        <div class="row-title">Continue Watching</div>
        <div class="row-head-actions">
          <button class="clear-cw-btn" id="clearCWBtn">Clear All</button>
        </div>
      </div>
      <div class="row-track"></div>`;
    rowsContainer.insertBefore(row, rowsContainer.children[1] || rowsContainer.firstChild);
    document.getElementById('clearCWBtn').addEventListener('click', () => clearContinueWatching());
  }

  if (!row) return;

  // Ensure clear button exists (row may have been re-rendered without it)
  if (!row.querySelector('#clearCWBtn')) {
    const head = row.querySelector('.row-head');
    if (head) {
      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'row-head-actions';
      actionsDiv.innerHTML = `<button class="clear-cw-btn" id="clearCWBtn">Clear All</button>`;
      head.appendChild(actionsDiv);
      document.getElementById('clearCWBtn').addEventListener('click', () => clearContinueWatching());
    }
  }

  const track = row.querySelector('.row-track');
  track.innerHTML = '';

  if (!list.length) {
    row.style.display = 'none';
  } else {
    row.style.display = '';
    list.forEach(item => track.appendChild(cardEl(item)));
  }
}

/* ---- Hero ---- */
let heroItems = [];
let heroIndex = 0;
let heroTimer = null;

async function loadHero() {
  const data = await tmdb('/trending/all/week');
  heroItems = (data.results || []).filter(i => i.backdrop_path).slice(0, 5);
  if (!heroItems.length) return;
  const slidesWrap = document.getElementById('heroSlides');
  const dotsWrap = document.getElementById('heroDots');
  heroItems.forEach((item, i) => {
    const slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    slide.style.backgroundImage = `url(${img(item.backdrop_path, IMG_BACKDROP)})`;
    slide.dataset.index = i;
    slidesWrap.appendChild(slide);
    const dot = document.createElement('button');
    if (i === 0) dot.className = 'active';
    dot.addEventListener('click', () => setHero(i));
    dotsWrap.appendChild(dot);
  });
  setHero(0);
  heroTimer = setInterval(() => setHero((heroIndex + 1) % heroItems.length), 8000);
}

function setHero(i) {
  heroIndex = i;
  const item = heroItems[i];
  if (!item) return;
  document.querySelectorAll('.hero-slide').forEach((s, idx) => s.classList.toggle('active', idx === i));
  document.querySelectorAll('#heroDots button').forEach((d, idx) => d.classList.toggle('active', idx === i));
  document.getElementById('heroTitle').textContent = mediaTitle(item);
  document.getElementById('heroOverview').textContent = item.overview || '';
  document.getElementById('heroMeta').innerHTML = `
    <span class="rating">★ ${item.vote_average ? item.vote_average.toFixed(1) : '–'}</span>
    <span>${mediaYear(item)}</span>
    <span>${mediaType(item) === 'tv' ? 'Series' : 'Film'}</span>`;
  document.getElementById('heroPlayBtn').onclick = () => openModal(item.id, mediaType(item), { autoplayTrailer: true });
  document.getElementById('heroInfoBtn').onclick = () => openModal(item.id, mediaType(item));
}

/* ---- Modal swipe-to-close ---- */
let modalTouchStart = 0;
let modalTouchCurrent = 0;

function setupModalSwipe() {
  const modal = document.getElementById('modal');
  const dragHandle = document.getElementById('modalDragHandle');
  dragHandle.addEventListener('touchstart', (e) => { modalTouchStart = e.touches[0].clientY; dragHandle.style.cursor = 'grabbing'; }, false);
  dragHandle.addEventListener('touchmove', (e) => {
    modalTouchCurrent = e.touches[0].clientY;
    const diff = modalTouchCurrent - modalTouchStart;
    if (diff > 0) modal.style.transform = `translateY(${diff}px)`;
  }, false);
  dragHandle.addEventListener('touchend', () => {
    dragHandle.style.cursor = 'grab';
    if (modalTouchCurrent - modalTouchStart > 100) closeModal();
    else modal.style.transform = 'translateY(0)';
  }, false);
}

async function openModal(id, type, opts = {}) {
  const backdrop = document.getElementById('modalBackdrop');
  const modal = document.getElementById('modal');
  const scrollContent = modal.querySelector('.modal-scroll');
  if (scrollContent) scrollContent.remove();
  const loadingDiv = document.createElement('div');
  loadingDiv.style.cssText = 'padding:80px; text-align:center; color:var(--text-dim);';
  loadingDiv.textContent = 'Loading…';
  modal.appendChild(loadingDiv);
  backdrop.classList.add('show');
  document.body.style.overflow = 'hidden';

  try {
    const data = await tmdb(`/${type}/${id}`, { append_to_response: 'videos,credits,external_ids' });
    const title = data.title || data.name;
    const year = (data.release_date || data.first_air_date || '').slice(0, 4);
    const runtime = type === 'movie'
      ? (data.runtime ? `${data.runtime} min` : null)
      : (data.number_of_seasons ? `${data.number_of_seasons} season${data.number_of_seasons > 1 ? 's' : ''}` : null);
    const genres = (data.genres || []).map(g => g.name);
    const cast = (data.credits?.cast || []).slice(0, 5).map(c => c.name).join(', ');
    const trailer = (data.videos?.results || []).find(v => v.site === 'YouTube' && v.type === 'Trailer')
      || (data.videos?.results || []).find(v => v.site === 'YouTube');
    const backdropUrl = img(data.backdrop_path, IMG_BACKDROP_SMALL);
    const inList = isInWatchlist(id, type);
    const imdbId = data.external_ids?.imdb_id || `tt${data.id}`;

    loadingDiv.remove();
    const scrollDiv = document.createElement('div');
    scrollDiv.className = 'modal-scroll';

    let playerHtml = '';
    let tvControlsHtml = '';
    if (type === 'movie') {
      playerHtml = `<div class="player-frame" id="playerFrame" style="display:none;"><iframe src="https://vidfast.pro/movie/${imdbId}?autoPlay=true&title=true&poster=true" allowfullscreen></iframe></div>`;
    } else {
      tvControlsHtml = `<div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
        <label style="font-size:13px; color:var(--text-dim);">Season: <select class="season-select" id="seasonSelect"></select></label>
        <label style="font-size:13px; color:var(--text-dim);">Episode: <select class="season-select" id="episodeSelect"></select></label>
      </div>`;
      playerHtml = `<div class="player-frame" id="playerFrame" style="display:none;"><iframe id="tvPlayerIframe" src="" allowfullscreen></iframe></div>`;
    }

    scrollDiv.innerHTML = `
      <div class="modal-hero" style="${backdropUrl ? `background-image:url(${backdropUrl})` : 'background:#1c1c1f'}">
        <button class="modal-close" id="modalCloseBtn">✕</button>
        <div class="modal-title-wrap"><div class="modal-title">${title}</div></div>
      </div>
      <div class="modal-body">
        <div class="modal-meta">
          <span style="color:var(--gold); font-weight:700;">★ ${data.vote_average ? data.vote_average.toFixed(1) : '–'}</span>
          <span>${year || '—'}</span>
          ${runtime ? `<span>${runtime}</span>` : ''}
        </div>
        <div class="pills">${genres.map(g => `<span class="pill">${g}</span>`).join('')}</div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="trailerBtn" ${trailer ? '' : 'disabled style="opacity:.4;cursor:default;"'}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            Trailer
          </button>
          ${tvControlsHtml}
          <button class="btn btn-primary" id="playBtn" style="background:var(--accent);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            Play
          </button>
          <button class="btn btn-ghost" id="watchlistBtn">${inList ? '✓ In My List' : '+ My List'}</button>
        </div>
        <div class="trailer-frame" id="trailerFrame"></div>
        ${playerHtml}
        <p class="modal-overview">${data.overview || 'No description available.'}</p>
        ${cast ? `<div class="cast-label">Cast</div><div class="cast-list">${cast}</div>` : ''}
        <div class="note">This app streams metadata, artwork, and trailers from TMDB. Full-length playback is powered by VidFast.</div>
      </div>`;

    modal.appendChild(scrollDiv);

    document.getElementById('modalCloseBtn').onclick = closeModal;
    document.getElementById('watchlistBtn').onclick = (e) => {
      const nowIn = toggleWatchlist({ id, media_type: type, title, poster_path: data.poster_path, vote_average: data.vote_average, release_date: data.release_date, first_air_date: data.first_air_date });
      e.target.textContent = nowIn ? '✓ In My List' : '+ My List';
    };

    document.getElementById('playBtn').onclick = () => {
      const playerFrame = document.getElementById('playerFrame');
      if (playerFrame) {
        playerFrame.classList.toggle('show');
        if (playerFrame.classList.contains('show')) {
          addToContinueWatching({ id, media_type: type, title, poster_path: data.poster_path, vote_average: data.vote_average, release_date: data.release_date, first_air_date: data.first_air_date });
        }
      }
    };

    if (trailer) {
      const frame = document.getElementById('trailerFrame');
      const playTrailer = () => {
        frame.classList.add('show');
        frame.innerHTML = `<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      };
      document.getElementById('trailerBtn').onclick = playTrailer;
      if (opts.autoplayTrailer) playTrailer();
    }

    if (type === 'tv' && data.number_of_seasons) {
      const seasonSelect = document.getElementById('seasonSelect');
      const episodeSelect = document.getElementById('episodeSelect');
      const tvPlayerIframe = document.getElementById('tvPlayerIframe');

      for (let s = 1; s <= data.number_of_seasons; s++) {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = `S${s}`;
        seasonSelect.appendChild(opt);
      }

      const updateEpisodes = async (season) => {
        try {
          const seasonData = await tmdb(`/tv/${id}/season/${season}`);
          const episodes = seasonData.episodes || [];
          episodeSelect.innerHTML = '';
          episodes.forEach((ep) => {
            const opt = document.createElement('option');
            opt.value = ep.episode_number;
            opt.textContent = `E${ep.episode_number}`;
            episodeSelect.appendChild(opt);
          });
          updatePlayerUrl();
        } catch (e) { console.error('Failed to load episodes:', e); }
      };

      const updatePlayerUrl = () => {
        const season = seasonSelect.value;
        const episode = episodeSelect.value;
        if (season && episode) tvPlayerIframe.src = `https://vidfast.pro/tv/${imdbId}/${season}/${episode}?autoPlay=true&title=true&poster=true`;
      };

      seasonSelect.addEventListener('change', () => updateEpisodes(seasonSelect.value));
      episodeSelect.addEventListener('change', updatePlayerUrl);
      updateEpisodes(1);
    }

  } catch (e) {
    console.error('Modal error:', e);
    loadingDiv.remove();
    const errorDiv = document.createElement('div');
    errorDiv.style.cssText = 'padding:60px; text-align:center; color:var(--text-dim);';
    errorDiv.innerHTML = `<button class="modal-close" id="modalCloseBtn" style="position:static; display:inline-flex; margin-bottom:20px;">✕</button><br>Something went wrong loading this title.`;
    modal.appendChild(errorDiv);
    document.getElementById('modalCloseBtn').onclick = closeModal;
  }
}

function closeModal() {
  const modal = document.getElementById('modal');
  const backdrop = document.getElementById('modalBackdrop');
  modal.classList.add('closing');
  setTimeout(() => {
    modal.style.transform = 'translateY(0)';
    modal.classList.remove('closing');
    backdrop.classList.remove('show');
    const scrollDiv = modal.querySelector('.modal-scroll');
    if (scrollDiv) scrollDiv.remove();
    document.body.style.overflow = '';
  }, 320);
}

document.getElementById('modalBackdrop').addEventListener('click', (e) => { if (e.target.id === 'modalBackdrop') closeModal(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
setupModalSwipe();

/* ---- Nav scroll state ---- */
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 30);
});

/* ---- Search ---- */
const searchToggle = document.getElementById('searchToggle');
const searchPanel = document.getElementById('searchPanel');
const searchInput = document.getElementById('searchInput');
const searchClearBtn = document.getElementById('searchClearBtn');
const recentWrap = document.getElementById('recentWrap');
const recentList = document.getElementById('recentList');
const clearRecentBtn = document.getElementById('clearRecentBtn');
const searchView = document.getElementById('searchView');
const rowsEl = document.getElementById('rows');
const heroEl = document.getElementById('hero');

const RECENT_KEY = 'netflix_recent_searches';
const getRecent = () => JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
const setRecent = (list) => localStorage.setItem(RECENT_KEY, JSON.stringify(list));

function addRecent(q) {
  q = q.trim();
  if (!q) return;
  let list = getRecent().filter(i => i.toLowerCase() !== q.toLowerCase());
  list.unshift(q);
  setRecent(list.slice(0, 8));
  renderRecent();
}

function renderRecent() {
  const list = getRecent();
  recentList.innerHTML = '';
  if (!list.length) {
    recentList.innerHTML = `<div class="recent-empty">Your recent searches will show up here.</div>`;
    return;
  }
  list.forEach(q => {
    const item = document.createElement('div');
    item.className = 'recent-item';
    item.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>${q}</span>`;
    item.addEventListener('click', () => {
      searchInput.value = q;
      searchClearBtn.style.display = 'flex';
      recentWrap.style.display = 'none';
      runSearch(q);
    });
    recentList.appendChild(item);
  });
}

function openSearchPanel() {
  searchPanel.classList.add('open');
  searchToggle.classList.add('active');
  renderRecent();
  setTimeout(() => searchInput.focus(), 50);
}
function closeSearchPanel() {
  searchPanel.classList.remove('open');
  searchToggle.classList.remove('active');
}

searchToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  searchPanel.classList.contains('open') ? closeSearchPanel() : openSearchPanel();
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap')) closeSearchPanel();
});

let searchDebounce;
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  searchClearBtn.style.display = q ? 'flex' : 'none';
  recentWrap.style.display = q ? 'none' : '';
  if (!q) { clearSearch(); return; }
  searchDebounce = setTimeout(() => runSearch(q), 400);
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { clearTimeout(searchDebounce); const q = searchInput.value.trim(); if (q) runSearch(q); }
  else if (e.key === 'Escape') closeSearchPanel();
});
searchClearBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  searchInput.value = '';
  searchClearBtn.style.display = 'none';
  recentWrap.style.display = '';
  clearSearch();
  searchInput.focus();
  renderRecent();
});
clearRecentBtn.addEventListener('click', (e) => { e.stopPropagation(); setRecent([]); renderRecent(); });

function clearSearch() {
  searchView.classList.remove('show');
  heroEl.style.display = '';
  rowsEl.style.display = '';
}

async function runSearch(query) {
  addRecent(query);
  heroEl.style.display = 'none';
  rowsEl.style.display = 'none';
  searchView.classList.add('show');
  const heading = document.getElementById('searchHeading');
  const grid = document.getElementById('searchGrid');
  heading.textContent = `Results for "${query}"`;
  grid.innerHTML = '';
  try {
    const data = await tmdb('/search/multi', { query, include_adult: 'false' });
    const results = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv');
    if (!results.length) { grid.innerHTML = `<div class="empty-row">No titles matched "${query}".</div>`; return; }
    results.forEach(item => grid.appendChild(cardEl(item)));
  } catch (e) {
    grid.innerHTML = `<div class="empty-row">Search failed — try again in a moment.</div>`;
  }
}

/* ---- Nav category filter ---- */
let currentCategory = 'home';

function applyCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.nav-links a').forEach(l => l.classList.toggle('active', l.dataset.cat === cat));
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  clearSearch();
  searchInput.value = '';
  document.querySelectorAll('.row').forEach(r => r.style.display = '');
  const mylistRow = document.getElementById('row-mylist');
  if (mylistRow) mylistRow.style.display = 'none';

  if (cat === 'movies') {
    document.querySelectorAll('.row').forEach(r => { if (r.id.includes('tv')) r.style.display = 'none'; });
  } else if (cat === 'tv') {
    document.querySelectorAll('.row').forEach(r => { if (!r.id.includes('tv') && r.id !== 'row-mylist' && r.id !== 'row-continue-watching') r.style.display = 'none'; });
  } else if (cat === 'mylist') {
    document.querySelectorAll('.row').forEach(r => { if (r.id !== 'row-mylist') r.style.display = 'none'; });
    if (mylistRow) mylistRow.style.display = '';
  }
  window.scrollTo({ top: cat === 'home' ? 0 : heroEl.offsetHeight - 80, behavior: 'smooth' });
}

document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', (e) => { e.preventDefault(); applyCategory(link.dataset.cat); });
});
document.querySelectorAll('.bottom-nav button').forEach(btn => {
  btn.addEventListener('click', () => applyCategory(btn.dataset.cat));
});
document.getElementById('logoBtn').addEventListener('click', () => applyCategory('home'));

/* =====================================================
   EXPLORE VIEW — infinite scroll, filters, sort
   ===================================================== */
const exploreView = document.getElementById('exploreView');
const exploreGrid = document.getElementById('exploreGrid');
const exploreLoader = document.getElementById('exploreLoader');
const exploreEnd = document.getElementById('exploreEnd');
const exploreCount = document.getElementById('exploreCount');

let explorePage = 1;
let exploreTotalPages = 1;
let exploreTotalResults = 0;
let exploreLoading = false;
let exploreActiveFilter = 'all';
let exploreSort = 'popularity.desc';
let exploreObserver = null;
let exploreSentinel = null;

function getExploreEndpoint() {
  const sort = exploreSort;
  const f = exploreActiveFilter;

  if (f === 'all') {
    // For "all", use trending (most relevant mix)
    return ['/trending/all/week', { page: explorePage }];
  }
  if (f === 'movie') {
    return ['/discover/movie', { sort_by: sort, page: explorePage, include_adult: 'false', 'vote_count.gte': 20 }];
  }
  if (f === 'tv') {
    return ['/discover/tv', { sort_by: sort, page: explorePage, include_adult: 'false', 'vote_count.gte': 10 }];
  }
  // Numeric = genre id — discover movies with that genre
  return ['/discover/movie', { with_genres: f, sort_by: sort, page: explorePage, include_adult: 'false', 'vote_count.gte': 10 }];
}

async function fetchExplorePage() {
  if (exploreLoading || explorePage > exploreTotalPages) return;
  exploreLoading = true;
  exploreLoader.style.display = 'flex';

  try {
    const [endpoint, params] = getExploreEndpoint();
    const data = await tmdb(endpoint, params);
    const results = (data.results || []).filter(r => r.poster_path);
    exploreTotalPages = Math.min(data.total_pages || 1, 500); // TMDB caps at 500
    exploreTotalResults = data.total_results || 0;

    // Remove skeleton placeholders on first load
    if (explorePage === 1) {
      exploreGrid.innerHTML = '';
      const approx = exploreTotalResults > 10000 ? '10,000+' : exploreTotalResults.toLocaleString();
      exploreCount.textContent = `${approx} titles`;
    }

    results.forEach(item => {
      const type = item.media_type || (item.first_air_date ? 'tv' : 'movie');
      item.media_type = type;
      exploreGrid.appendChild(cardEl(item));
    });

    explorePage++;

    if (explorePage > exploreTotalPages) {
      exploreEnd.style.display = 'block';
      if (exploreObserver && exploreSentinel) exploreObserver.unobserve(exploreSentinel);
    }
  } catch (e) {
    console.error('Explore fetch error:', e);
  }

  exploreLoader.style.display = 'none';
  exploreLoading = false;
}

function resetExplore() {
  explorePage = 1;
  exploreTotalPages = 1;
  exploreTotalResults = 0;
  exploreLoading = false;
  exploreGrid.innerHTML = '';
  exploreEnd.style.display = 'none';
  exploreCount.textContent = '';

  // Show skeleton grid while loading
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'explore-skel';
    exploreGrid.appendChild(s);
  }

  // Re-attach sentinel
  if (exploreSentinel) exploreSentinel.remove();
  exploreSentinel = document.createElement('div');
  exploreSentinel.style.height = '1px';
  exploreView.appendChild(exploreSentinel);

  if (exploreObserver) exploreObserver.disconnect();
  exploreObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) fetchExplorePage();
  }, { threshold: 0, rootMargin: '400px' });
  exploreObserver.observe(exploreSentinel);

  fetchExplorePage();
}

function openExplore() {
  exploreView.classList.add('show');
  document.body.style.overflow = 'hidden';
  resetExplore();
}

function closeExplore() {
  exploreView.classList.remove('show');
  document.body.style.overflow = '';
  if (exploreObserver) exploreObserver.disconnect();
}

// Trigger button
document.getElementById('exploreTriggerBtn').addEventListener('click', openExplore);

// Back button
document.getElementById('exploreBackBtn').addEventListener('click', closeExplore);

// Esc key
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && exploreView.classList.contains('show')) closeExplore();
});

// Filter pills
document.querySelectorAll('#exploreFilters .filter-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('#exploreFilters .filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    exploreActiveFilter = pill.dataset.type;
    resetExplore();
  });
});

// Sort select
document.getElementById('exploreSort').addEventListener('change', (e) => {
  exploreSort = e.target.value;
  resetExplore();
});
