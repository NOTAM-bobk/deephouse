<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Netflix — Streaming UI (TMDB)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c;
    --bg-elev:#141416;
    --card:#1c1c1f;
    --card-hover:#232327;
    --text:#f3f1ec;
    --text-dim:#9a9a9e;
    --text-faint:#5e5e63;
    --accent:#e0263b;
    --accent-dim:#9c1a29;
    --gold:#f5c451;
    --border:rgba(255,255,255,0.08);
    --shadow:0 20px 60px rgba(0,0,0,0.55);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent); color:#fff;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  img{display:block; max-width:100%;}

  /* ---------- sprocket / filmstrip motif ---------- */
  .sprocket{ display:flex; gap:7px; align-items:center; }
  .sprocket span{ width:5px; height:5px; border-radius:50%; background:var(--accent); opacity:.55; }
  .sprocket.long span{width:4px;height:4px;}

  /* ---------- Nav ---------- */
  .nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 4vw;
    transition:background .35s ease, padding .35s ease, box-shadow .35s ease;
  }
  .nav.scrolled{
    background:rgba(20,20,24,0.4);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    box-shadow:0 4px 24px rgba(0,0,0,.25);
    padding:10px 4vw;
  }
  .logo{
    font-family:'Bebas Neue', sans-serif;
    font-size:28px;
    letter-spacing:4px;
    color:var(--accent);
    display:flex; align-items:center; gap:8px;
    cursor:pointer;
  }
  .nav-links{ display:flex; gap:26px; font-size:14px; font-weight:500; color:var(--text-dim); }
  .nav-links a{transition:color .2s;}
  .nav-links a:hover, .nav-links a.active{color:var(--text);}
  .nav-right{display:flex; align-items:center; gap:18px;}
  .search-wrap{display:flex; align-items:center; position:relative;}
  .icon-btn{
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:50%; color:var(--text); opacity:.85; transition:opacity .2s, background .2s;
  }
  .icon-btn:hover{opacity:1; background:rgba(255,255,255,.08);}
  .icon-btn.active{background:rgba(255,255,255,.1); opacity:1;}
  .search-panel{
    position:absolute; top:calc(100% + 12px); right:0; width:340px; max-width:88vw;
    background:rgba(18,18,21,0.88);
    backdrop-filter:blur(26px) saturate(160%);
    -webkit-backdrop-filter:blur(26px) saturate(160%);
    border:1px solid var(--border); border-radius:16px;
    padding:14px; box-shadow:var(--shadow);
    opacity:0; transform:translateY(-8px) scale(.98);
    pointer-events:none; transition:opacity .2s ease, transform .2s ease;
  }
  .search-panel.open{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}
  .search-field{
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.07); border:1px solid var(--border); border-radius:11px;
    padding:11px 14px; transition:border-color .2s, background .2s;
  }
  .search-field:focus-within{border-color:var(--accent); background:rgba(255,255,255,.1);}
  .search-field svg{flex-shrink:0; color:var(--text-dim);}
  .search-field input{ flex:1; background:none; border:none; color:var(--text); font-size:14.5px; outline:none; }
  .search-field input::placeholder{color:var(--text-faint);}
  .search-clear{
    flex-shrink:0; color:var(--text-faint); font-size:15px; line-height:1;
    width:20px; height:20px; display:none; align-items:center; justify-content:center; border-radius:50%;
  }
  .search-clear:hover{color:var(--text); background:rgba(255,255,255,.08);}
  .recent-wrap{margin-top:14px;}
  .recent-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; padding:0 2px;}
  .recent-head span{font-size:10.5px; text-transform:uppercase; letter-spacing:1.4px; color:var(--text-faint); font-weight:700;}
  .recent-head button{font-size:11px; color:var(--text-dim);}
  .recent-head button:hover{color:var(--text);}
  .recent-list{display:flex; flex-direction:column; gap:1px; max-height:240px; overflow-y:auto;}
  .recent-item{
    display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:9px;
    font-size:13.5px; color:var(--text-dim); cursor:pointer; transition:background .15s, color .15s;
  }
  .recent-item:hover{background:rgba(255,255,255,.07); color:var(--text);}
  .recent-item svg{width:14px; height:14px; flex-shrink:0; color:var(--text-faint);}
  .recent-empty{font-size:12px; color:var(--text-faint); padding:8px 2px;}

  /* ---------- Hero ---------- */
  .hero{
    position:relative; height:92vh; min-height:560px; width:100%;
    display:flex; flex-direction:column; justify-content:flex-end;
    overflow:hidden;
  }
  .hero-slide{ position:absolute; inset:0; opacity:0; transition:opacity 1.2s ease; background-size:cover; background-position:top center; }
  .hero-slide.active{opacity:1;}
  .hero-scrim{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(10,10,12,0.15) 0%, rgba(10,10,12,0.05) 30%, rgba(10,10,12,0.85) 82%, var(--bg) 100%),
      linear-gradient(90deg, rgba(10,10,12,0.75) 0%, rgba(10,10,12,0.15) 48%, rgba(10,10,12,0.05) 70%);
  }
  .hero-content{ position:relative; z-index:2; padding:0 4vw 64px; max-width:680px; }
  .hero-title{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(40px, 7vw, 84px);
    line-height:1.02; letter-spacing:1px;
    text-shadow:0 8px 30px rgba(0,0,0,.5);
  }
  .hero-rule{margin:16px 0 18px;}
  .hero-meta{ display:flex; gap:14px; align-items:center; font-size:13px; color:var(--text-dim); margin-bottom:16px; flex-wrap:wrap; }
  .hero-meta .rating{color:var(--gold); font-weight:700;}
  .hero-overview{
    color:var(--text-dim); font-size:15px; line-height:1.6;
    max-width:560px; margin-bottom:24px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .hero-actions{display:flex; gap:12px; flex-wrap:wrap;}
  .btn{
    display:flex; align-items:center; gap:8px;
    padding:12px 24px; border-radius:6px; font-weight:700; font-size:14.5px;
    transition:transform .15s ease, background .2s, opacity .2s;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--text); color:#000;}
  .btn-primary:hover{background:#d8d6d0;}
  .btn-ghost{background:rgba(120,120,130,0.35); color:var(--text); backdrop-filter:blur(6px);}
  .btn-ghost:hover{background:rgba(120,120,130,0.5);}
  .btn-play{background:var(--accent); color:#fff;}
  .btn-play:hover{background:#c41f32;}
  .hero-dots{ position:absolute; bottom:18px; right:4vw; z-index:3; display:flex; gap:8px; }
  .hero-dots button{ width:22px; height:3px; background:rgba(255,255,255,.3); border-radius:2px; transition:background .25s, width .25s; }
  .hero-dots button.active{background:var(--accent); width:34px;}

  /* ---------- Rows ---------- */
  .rows{position:relative; z-index:2; margin-top:48px; padding-bottom:60px;}
  .row{margin-bottom:38px;}
  .row-head{ display:flex; align-items:baseline; gap:10px; padding:0 4vw; margin-bottom:12px; }
  .row-title{font-size:18px; font-weight:800; letter-spacing:.3px;}
  .row-track{
    display:flex; gap:10px; overflow-x:auto; padding:4px 4vw 18px;
    scroll-snap-type:x proximity;
    scrollbar-width:none;
  }
  .row-track::-webkit-scrollbar{display:none;}
  .top10-track{padding-left:9vw;}
  .top10-item{display:flex; align-items:flex-end; flex:0 0 auto; scroll-snap-align:start;}
  .top10-rank{
    font-family:'Bebas Neue', sans-serif; font-size:128px; line-height:0.72;
    color:transparent; -webkit-text-stroke:2px var(--text-faint);
    margin-right:-30px; position:relative; top:18px; user-select:none; pointer-events:none;
  }
  .card{
    position:relative; flex:0 0 auto; width:170px; aspect-ratio:2/3;
    border-radius:8px; overflow:hidden; background:var(--card);
    scroll-snap-align:start; cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease, z-index 0s;
    border:1px solid var(--border);
  }
  .card:hover{ transform:scale(1.08) translateY(-6px); z-index:5; box-shadow:var(--shadow), 0 0 0 2px var(--accent); }
  .card img{width:100%; height:100%; object-fit:cover;}
  .card-fallback{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:10px; font-size:13px; color:var(--text-dim);
    background:linear-gradient(160deg, #232327, #16161a);
  }
  .card-meta{
    position:absolute; left:0; right:0; bottom:0; padding:8px;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.92));
    opacity:0; transition:opacity .2s;
    font-size:11.5px;
  }
  .card:hover .card-meta{opacity:1;}
  .card-meta .r{color:var(--gold); font-weight:700;}
  .skel{
    flex:0 0 auto; width:170px; aspect-ratio:2/3; border-radius:8px;
    background:linear-gradient(100deg, var(--card) 30%, var(--card-hover) 50%, var(--card) 70%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  /* ---------- My List empty state ---------- */
  .empty-row{ padding:0 4vw; color:var(--text-faint); font-size:13.5px; }

  /* ---------- Search results grid ---------- */
  .search-view{display:none; padding:120px 4vw 60px;}
  .search-view.show{display:block;}
  .search-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:16px; }
  .search-heading{font-size:22px; font-family:'Bebas Neue'; letter-spacing:1px; margin-bottom:18px;}

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200;
    display:none; align-items:flex-end; justify-content:center;
    padding:0; transition:background .2s ease;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    width:100%; max-width:880px; height:94vh; max-height:94vh;
    background:var(--bg-elev);
    border-radius:20px 20px 0 0; overflow:hidden; box-shadow:var(--shadow);
    border:1px solid var(--border); border-bottom:none;
    display:flex; flex-direction:column;
    animation:riseUp .32s cubic-bezier(.22,.8,.25,1);
  }
  @keyframes riseUp{from{transform:translateY(100%);} to{transform:translateY(0);}}
  .modal-drag-handle{
    flex-shrink:0; display:flex; justify-content:center; padding:12px 0 8px;
    cursor:grab; touch-action:none;
  }
  .modal-drag-handle .bar{width:42px; height:4px; border-radius:3px; background:var(--text-faint); opacity:.6;}
  .modal-scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .modal-hero{position:relative; aspect-ratio:16/8; background-size:cover; background-position:center;}
  .modal-hero::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(10,10,12,.1), var(--bg-elev) 95%);
  }
  .modal-close{
    position:absolute; top:14px; right:14px; z-index:5;
    width:34px; height:34px; border-radius:50%; background:rgba(10,10,12,.75);
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .modal-title-wrap{position:absolute; bottom:18px; left:28px; right:28px; z-index:2;}
  .modal-title{font-family:'Bebas Neue'; font-size:clamp(28px,5vw,42px); letter-spacing:1px;}
  .modal-body{padding:10px 28px 32px;}
  .modal-actions{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap;}
  .modal-meta{display:flex; gap:14px; flex-wrap:wrap; font-size:13px; color:var(--text-dim); margin-bottom:14px;}
  .pill{ border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--text-dim); }
  .pills{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .modal-overview{color:var(--text-dim); line-height:1.65; font-size:14.5px; margin-bottom:18px;}
  .cast-label{font-size:12px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px;}
  .cast-list{font-size:13.5px; color:var(--text-dim); margin-bottom:18px;}
  .trailer-frame{
    position:relative; width:100%; aspect-ratio:16/9; border-radius:8px; overflow:hidden;
    background:#000; margin-top:6px; display:none;
  }
  .trailer-frame.show{display:block;}
  .trailer-frame iframe{width:100%; height:100%; border:0;}
  .episodes-wrap{margin-top:6px; margin-bottom:18px;}
  .episodes-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:12px; flex-wrap:wrap;}
  .season-select{
    background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:8px;
    padding:7px 10px; font-size:13px; font-family:inherit;
  }
  .episode-item{display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); position:relative;}
  .episode-item:last-child{border-bottom:none;}
  .episode-num{flex-shrink:0; width:26px; text-align:center; color:var(--text-faint); font-weight:700; font-size:14px; padding-top:2px;}
  .episode-still{flex-shrink:0; width:120px; aspect-ratio:16/9; border-radius:6px; overflow:hidden; background:var(--card); position:relative;}
  .episode-still img{width:100%; height:100%; object-fit:cover;}
  .episode-play-overlay{
    position:absolute; inset:0; background:rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .2s; cursor:pointer; border-radius:6px;
  }
  .episode-still:hover .episode-play-overlay{opacity:1;}
  .episode-play-overlay svg{width:32px; height:32px; color:#fff; filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
  .episode-info{flex:1; min-width:0;}
  .episode-title{font-size:13.5px; font-weight:700; margin-bottom:3px;}
  .episode-meta{font-size:11.5px; color:var(--text-faint); margin-bottom:5px;}
  .episode-overview{font-size:12.5px; color:var(--text-dim); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .episode-loading{font-size:12.5px; color:var(--text-faint); padding:10px 0;}
  .note{
    font-size:11.5px; color:var(--text-faint); margin-top:18px; line-height:1.5;
    border-top:1px solid var(--border); padding-top:14px;
  }

  /* ---------- Player Popup ---------- */
  .player-popup{
    position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,0.92);
    display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    animation:fadeInPlayer .2s ease;
  }
  .player-popup.show{display:flex;}
  @keyframes fadeInPlayer{from{opacity:0;}to{opacity:1;}}
  .player-wrap{
    position:relative;
    width:95vw; max-width:1280px;
    aspect-ratio:16/9;
    background:#000;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.06);
  }
  .player-wrap iframe{
    width:100%; height:100%;
    border:0;
    display:block;
  }
  .player-close{
    position:absolute; top:-14px; right:-14px;
    width:36px; height:36px; border-radius:50%;
    background:rgba(30,30,34,0.95); border:1px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; color:var(--text); cursor:pointer; z-index:10;
    transition:background .2s, transform .15s;
    box-shadow:0 4px 16px rgba(0,0,0,0.5);
  }
  .player-close:hover{background:var(--accent); transform:scale(1.1);}
  .player-label{
    position:absolute; top:-44px; left:0; right:44px;
    font-family:'Bebas Neue', sans-serif; font-size:22px; letter-spacing:1px;
    color:var(--text); opacity:.85; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .player-source-note{
    position:absolute; bottom:-28px; left:0;
    font-size:11px; color:rgba(255,255,255,0.3);
  }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#fff; color:#000; padding:11px 20px; border-radius:8px; font-size:13.5px; font-weight:600;
    opacity:0; transition:opacity .25s, transform .25s; z-index:1300; box-shadow:var(--shadow);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---------- Footer ---------- */
  .footer{ padding:50px 4vw 80px; color:var(--text-faint); font-size:12px; display:flex; flex-direction:column; gap:10px; align-items:center; text-align:center; }

  /* ---------- Mobile bottom nav ---------- */
  .bottom-nav{
    display:none;
    position:fixed; bottom:0; left:0; right:0; z-index:150;
    background:rgba(15,15,17,0.55);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    border-top:1px solid var(--border);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .bottom-nav button{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--text-dim); font-size:11px; font-weight:600;
    flex:1; padding:4px 0; transition:color .2s;
  }
  .bottom-nav button.active{color:var(--accent);}
  .bottom-nav svg{width:20px; height:20px;}

  @media (max-width:640px){
    .nav-links{display:none;}
    .hero{height:80vh;}
    .hero-content{padding:0 5vw 48px;}
    .card{width:128px;}
    .skel{width:128px;}
    .search-panel{width:86vw; right:-8px;}
    .top10-rank{font-size:78px; margin-right:-16px; top:10px;}
    .modal{height:96vh;}
    .modal-title-wrap{left:18px; right:18px;}
    .modal-body{padding:8px 18px 26px;}
    .episode-still{width:88px;}
    body{padding-bottom:64px;}
    .bottom-nav{display:flex;}
    .toast{bottom:80px;}
    .player-wrap{width:100vw; border-radius:0;}
    .player-close{top:8px; right:8px;}
    .player-label{display:none;}
  }

  /* ===================== Netflix Intro Animation ===================== */
  :root{
    --bg-color: #000000;
    --base-color: #e40913;
    --base-color-rgb: 228, 9, 19;
  }
  #introOverlay{
    position:fixed; inset:0; z-index:9999;
    background:#000;
    display:flex; justify-content:center; align-items:center;
    overflow:hidden;
    transition:opacity .6s ease;
  }
  #introOverlay.fade-out{ opacity:0; pointer-events:none; }
  #introContainer{
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    width:100%; height:100%;
    background-color:var(--bg-color);
    overflow:hidden;
  }
  netflixintro{
    display:block; position:relative; width:300px; height:300px; overflow:hidden;
    animation:zoom-in 3.5s ease-in 0.5s forwards;
    background-size:4000px; background-position:-1950px 0;
  }
  netflixintro::before{
    content:""; position:absolute; display:block;
    background-color:var(--bg-color);
    width:150%; height:30%; left:-25%; bottom:-27%;
    border-radius:50%; z-index:5; transform-origin:left center;
    background-size:4000px; background-position:-1950px 0;
  }
  netflixintro > [class*="helper-"]{ display:none; }
  netflixintro[letter="N"] > .helper-1, netflixintro[letter="N"] > .helper-2, netflixintro[letter="N"] > .helper-3 { display:block; }
  netflixintro[letter="E"] > .helper-1, netflixintro[letter="E"] > .helper-2, netflixintro[letter="E"] > .helper-3, netflixintro[letter="E"] > .helper-4 { display:block; }
  netflixintro[letter="T"] > .helper-1, netflixintro[letter="T"] > .helper-2 { display:block; }
  netflixintro[letter="F"] > .helper-1, netflixintro[letter="F"] > .helper-2, netflixintro[letter="F"] > .helper-3 { display:block; }
  netflixintro[letter="L"] > .helper-1, netflixintro[letter="L"] > .helper-2 { display:block; }
  netflixintro[letter="I"] > .helper-1 { display:block; }
  netflixintro[letter="X"] > .helper-1, netflixintro[letter="X"] > .helper-2 { display:block; }
  netflixintro [class*="helper-"]{ position:absolute; }

  .effect-brush{ position:absolute; width:100%; height:300%; top:0; overflow:hidden; }
  .effect-brush::before{
    display:block; content:""; position:absolute;
    background-color:var(--base-color);
    width:100%; height:70%;
    box-shadow:0px 0px 29px 24px var(--base-color);
  }
  .effect-lumieres{ position:absolute; width:100%; height:100%; opacity:0; animation:showing-lumieres 2s 1.6s forwards; }
  [class*="fur-"]{ display:block; position:absolute; bottom:10%; height:30%; }

<script>
/* ===================== Netflix Intro ===================== */
(function () {
  const FUR_COUNT = 31;
  const LAMP_COUNT = 28;
  function buildBrush() {
    let s = '';
    for (let i = FUR_COUNT; i >= 1; i--) s += `<span class="fur-${i}"></span>`;
    return `<div class="effect-brush">${s}</div>`;
  }
  function buildLumieres() {
    let s = '';
    for (let i = 1; i <= LAMP_COUNT; i++) s += `<span class="lamp-${i}"></span>`;
    return `<div class="effect-lumieres">${s}</div>`;
  }
  function buildHelper(n) { return `<div class="helper-${n}">${buildBrush()}${buildLumieres()}</div>`; }
  const introEl = document.getElementById('netflixIntroEl');
  const overlay = document.getElementById('introOverlay');
  if (!introEl || !overlay) return;
  introEl.innerHTML = buildHelper(1) + buildHelper(2) + buildHelper(3) + buildHelper(4);
  document.body.style.overflow = 'hidden';
  const letters = ['N', 'E', 'T', 'F', 'L', 'I', 'X'];
  let idx = 0;
  const cycle = setInterval(() => {
    idx++;
    if (idx < letters.length) { introEl.setAttribute('letter', letters[idx]); }
    else { clearInterval(cycle); }
  }, 380);
  setTimeout(() => {
    overlay.classList.add('fade-out');
    setTimeout(() => { overlay.remove(); document.body.style.overflow = ''; }, 650);
  }, 4200);
})();

const TMDB_KEY = 'b1941699110de014fceb3d15828f4718';
const BASE = 'https://api.themoviedb.org/3';
const IMG_POSTER = 'https://image.tmdb.org/t/p/w400';
const IMG_BACKDROP = 'https://image.tmdb.org/t/p/w1280';
const IMG_BACKDROP_SMALL = 'https://image.tmdb.org/t/p/w780';

async function tmdb(path, params = {}) {
  const url = new URL(BASE + path);
  url.searchParams.set('api_key', TMDB_KEY);
  url.searchParams.set('language', 'en-US');
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  let res = await fetch(url);
  if (res.status === 429) {
    const wait = Number(res.headers.get('Retry-After') || 1) * 1000;
    await new Promise(r => setTimeout(r, wait));
    res = await fetch(url);
  }
  if (!res.ok) throw new Error('TMDB request failed: ' + res.status);
  return res.json();
}

const img = (path, size) => path ? size + path : null;

/* ---- Watchlist ---- */
const WL_KEY = 'velvet_watchlist';
const getWatchlist = () => JSON.parse(localStorage.getItem(WL_KEY) || '[]');
const setWatchlist = (list) => localStorage.setItem(WL_KEY, JSON.stringify(list));
const isInWatchlist = (id, type) => getWatchlist().some(i => i.id === id && i.media_type === type);
function toggleWatchlist(item) {
  let list = getWatchlist();
  const exists = list.some(i => i.id === item.id && i.media_type === item.media_type);
  if (exists) { list = list.filter(i => !(i.id === item.id && i.media_type === item.media_type)); showToast('Removed from My List'); }
  else { list.unshift(item); showToast('Added to My List'); }
  setWatchlist(list);
  renderMyListRow();
  return !exists;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---- Card / Row rendering ---- */
function mediaTitle(item) { return item.title || item.name || 'Untitled'; }
function mediaYear(item) { const d = item.release_date || item.first_air_date; return d ? d.slice(0, 4) : '—'; }
function mediaType(item) { return item.media_type || (item.first_air_date ? 'tv' : 'movie'); }

function cardEl(item) {
  const type = mediaType(item);
  const card = document.createElement('div');
  card.className = 'card';
  const posterUrl = img(item.poster_path, IMG_POSTER);
  card.innerHTML = posterUrl
    ? `<img loading="lazy" src="${posterUrl}" alt="${mediaTitle(item)}">`
    : `<div class="card-fallback">${mediaTitle(item)}</div>`;
  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.innerHTML = `<div>${mediaTitle(item)}</div><div><span class="r">★ ${item.vote_average ? item.vote_average.toFixed(1) : '–'}</span> · ${mediaYear(item)}</div>`;
  card.appendChild(meta);
  card.addEventListener('click', () => openModal(item.id, type));
  return card;
}

function skeletonRow(track, n = 8) {
  for (let i = 0; i < n; i++) { const s = document.createElement('div'); s.className = 'skel'; track.appendChild(s); }
}

function buildRowShell(title, rowId) {
  const rows = document.getElementById('rows');
  const row = document.createElement('div');
  row.className = 'row';
  row.id = rowId;
  row.innerHTML = `<div class="row-head"><div class="row-title">${title}</div></div><div class="row-track"></div>`;
  rows.appendChild(row);
  const track = row.querySelector('.row-track');
  skeletonRow(track);
  return track;
}

function fillTrack(track, items, fallbackType) {
  track.innerHTML = '';
  if (!items.length) { track.parentElement.style.display = 'none'; return; }
  items.forEach(item => {
    if (!item.media_type) item.media_type = fallbackType;
    track.appendChild(cardEl(item));
  });
}

async function loadRow(title, rowId, fetcher, fallbackType) {
  const track = buildRowShell(title, rowId);
  try {
    const data = await fetcher();
    fillTrack(track, data.results || [], fallbackType);
  } catch (e) {
    track.innerHTML = `<div class="empty-row">Couldn't load this row right now.</div>`;
  }
}

function renderMyListRow() {
  let row = document.getElementById('row-mylist');
  const rowsContainer = document.getElementById('rows');
  const list = getWatchlist();
  if (!row) {
    row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-mylist';
    row.style.display = 'none';
    row.innerHTML = `<div class="row-head"><div class="row-title">My List</div></div><div class="row-track"></div>`;
    rowsContainer.insertBefore(row, rowsContainer.firstChild);
  }
  const track = row.querySelector('.row-track');
  track.innerHTML = '';
  if (!list.length) {
    track.innerHTML = `<div class="empty-row">Titles you save will show up here. Tap "+ My List" on anything to add it.</div>`;
  } else {
    list.forEach(item => track.appendChild(cardEl(item)));
  }
  row.style.display = (typeof currentCategory !== 'undefined' && currentCategory === 'mylist') ? '' : 'none';
}

/* ---- Modal swipe-down-to-close ---- */
let modalDrag = { active: false, startY: 0, deltaY: 0 };
function modalDragStart(clientY) {
  if (!document.getElementById('modalBackdrop').classList.contains('show')) return;
  modalDrag = { active: true, startY: clientY, deltaY: 0 };
  document.getElementById('modal').style.transition = 'none';
}
function modalDragMove(clientY) {
  if (!modalDrag.active) return;
  const delta = clientY - modalDrag.startY;
  if (delta < 0) return;
  modalDrag.deltaY = delta;
  document.getElementById('modal').style.transform = `translateY(${delta}px)`;
  document.getElementById('modalBackdrop').style.background = `rgba(0,0,0,${Math.max(0.7 - delta / 500, 0)})`;
}
function modalDragEnd() {
  if (!modalDrag.active) return;
  const modal = document.getElementById('modal');
  modal.style.transition = 'transform .25s ease';
  if (modalDrag.deltaY > 120) { modal.style.transform = 'translateY(100%)'; setTimeout(closeModal, 200); }
  else { modal.style.transform = 'translateY(0)'; document.getElementById('modalBackdrop').style.background = ''; }
  modalDrag = { active: false, startY: 0, deltaY: 0 };
}
document.addEventListener('pointerdown', (e) => {
  const handle = document.getElementById('modalDragHandle');
  if (handle && (e.target === handle || handle.contains(e.target))) modalDragStart(e.clientY);
});
document.addEventListener('pointermove', (e) => modalDragMove(e.clientY));
document.addEventListener('pointerup', modalDragEnd);
document.addEventListener('pointercancel', modalDragEnd);

/* ---- Search ---- */
const searchToggle = document.getElementById('searchToggle');
const searchPanel = document.getElementById('searchPanel');
const searchInput = document.getElementById('searchInput');
const searchClearBtn = document.getElementById('searchClearBtn');
const recentWrap = document.getElementById('recentWrap');
const recentList = document.getElementById('recentList');
const clearRecentBtn = document.getElementById('clearRecentBtn');
const searchView = document.getElementById('searchView');
const rowsEl = document.getElementById('rows');
const heroEl = document.getElementById('hero');

const RECENT_KEY = 'netflix_recent_searches';
const getRecent = () => JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
const setRecent = (list) => localStorage.setItem(RECENT_KEY, JSON.stringify(list));

function addRecent(q) {
  q = q.trim();
  if (!q) return;
  let list = getRecent().filter(i => i.toLowerCase() !== q.toLowerCase());
  list.unshift(q);
  setRecent(list.slice(0, 8));
  renderRecent();
}

function renderRecent() {
  const list = getRecent();
  recentList.innerHTML = '';
  if (!list.length) { recentList.innerHTML = `<div class="recent-empty">Your recent searches will show up here.</div>`; return; }
  list.forEach(q => {
    const item = document.createElement('div');
    item.className = 'recent-item';
    item.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>${q}</span>`;
    item.addEventListener('click', () => {
      searchInput.value = q;
      searchClearBtn.style.display = 'flex';
      recentWrap.style.display = 'none';
      runSearch(q);
    });
    recentList.appendChild(item);
  });
}

function openSearchPanel() { searchPanel.classList.add('open'); searchToggle.classList.add('active'); renderRecent(); setTimeout(() => searchInput.focus(), 50); }
function closeSearchPanel() { searchPanel.classList.remove('open'); searchToggle.classList.remove('active'); }

searchToggle.addEventListener('click', (e) => { e.stopPropagation(); searchPanel.classList.contains('open') ? closeSearchPanel() : openSearchPanel(); });
document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) closeSearchPanel(); });

let searchDebounce;
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  searchClearBtn.style.display = q ? 'flex' : 'none';
  recentWrap.style.display = q ? 'none' : '';
  if (!q) { clearSearch(); return; }
  searchDebounce = setTimeout(() => runSearch(q), 400);
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { clearTimeout(searchDebounce); const q = searchInput.value.trim(); if (q) runSearch(q); }
  else if (e.key === 'Escape') { closeSearchPanel(); }
});
searchClearBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  searchInput.value = ''; searchClearBtn.style.display = 'none'; recentWrap.style.display = '';
  clearSearch(); searchInput.focus(); renderRecent();
});
clearRecentBtn.addEventListener('click', (e) => { e.stopPropagation(); setRecent([]); renderRecent(); });

function clearSearch() { searchView.classList.remove('show'); heroEl.style.display = ''; rowsEl.style.display = ''; }

async function runSearch(query) {
  addRecent(query);
  heroEl.style.display = 'none'; rowsEl.style.display = 'none';
  searchView.classList.add('show');
  const heading = document.getElementById('searchHeading');
  const grid = document.getElementById('searchGrid');
  heading.textContent = `Results for "${query}"`;
  grid.innerHTML = '';
  try {
    const data = await tmdb('/search/multi', { query, include_adult: 'false' });
    const results = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv');
    if (!results.length) { grid.innerHTML = `<div class="empty-row">No titles matched "${query}".</div>`; return; }
    results.forEach(item => grid.appendChild(cardEl(item)));
  } catch (e) {
    grid.innerHTML = `<div class="empty-row">Search failed — try again in a moment.</div>`;
  }
}

function applyCategory(cat) {
  currentCategory = cat;

  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));

    document.querySelectorAll('.row').forEach(r => { if (r.id.includes('tv')) r.style.display = 'none'; });
  } else if (cat === 'tv') {
    document.querySelectorAll('.row').forEach(r => { if (!r.id.includes('tv') && r.id !== 'row-mylist') r.style.display = 'none'; });
  } else if (cat === 'mylist') {
    document.querySelectorAll('.row').forEach(r => { if (r.id !== 'row-mylist') r.style.display = 'none'; });

  window.scrollTo({ top: cat === 'home' ? 0 : heroEl.offsetHeight - 80, behavior: 'smooth' });
}

document.querySelectorAll('.nav-links a').forEach(link => { link.addEventListener('click', (e) => { e.preventDefault(); applyCategory(link.dataset.cat); }); });
document.querySelectorAll('.bottom-nav button').forEach(btn => { btn.addEventListener('click', () => applyCategory(btn.dataset.cat)); });
document.getElementById('logoBtn').addEventListener('click', () => applyCategory('home'));

/* ---- Top 10 ---- */
async function loadTop10() {
  const rowsContainer = document.getElementById('rows');
  const row = document.createElement('div');
  row.className = 'row'; row.id = 'row-top10';
  row.innerHTML = `<div class="row-head"><div class="row-title">Top 10 Today</div></div><div class="row-track top10-track"></div>`;
  rowsContainer.appendChild(row);
  const track = row.querySelector('.top10-track');
  skeletonRow(track, 10);
  try {
    const data = await tmdb('/trending/all/day');
    const items = (data.results || []).filter(i => i.poster_path).slice(0, 10);
    track.innerHTML = '';
    items.forEach((item, idx) => {
      if (!item.media_type) item.media_type = item.first_air_date ? 'tv' : 'movie';
      const wrap = document.createElement('div');
      wrap.className = 'top10-item';
      const rank = document.createElement('div');
      rank.className = 'top10-rank';
      rank.textContent = idx + 1;
      wrap.appendChild(rank);
      wrap.appendChild(cardEl(item));
      track.appendChild(wrap);
    });
  } catch (e) {
    track.innerHTML = `<div class="empty-row">Couldn't load Top 10 right now.</div>`;
  }
}

/* ---- Boot ---- */
async function init() {
  renderMyListRow();
  loadTop10();
  loadHero();
  loadRow('Trending Now', 'row-trending', () => tmdb('/trending/all/week'), 'movie');
  loadRow('Popular Movies', 'row-popmovies', () => tmdb('/movie/popular'), 'movie');
  loadRow('Popular TV Shows', 'row-tvpopular', () => tmdb('/tv/popular'), 'tv');
  loadRow('Top Rated Films', 'row-topmovies', () => tmdb('/movie/top_rated'), 'movie');
  loadRow('Critically Acclaimed Series', 'row-tvtop', () => tmdb('/tv/top_rated'), 'tv');
  loadRow('Action & Adventure', 'row-action', () => tmdb('/discover/movie', { with_genres: 28, sort_by: 'popularity.desc' }), 'movie');
  loadRow('Sci-Fi & Fantasy', 'row-scifi', () => tmdb('/discover/movie', { with_genres: 878, sort_by: 'popularity.desc' }), 'movie');
  loadRow('Comedies', 'row-comedy', () => tmdb('/discover/movie', { with_genres: 35, sort_by: 'popularity.desc' }), 'movie');
  loadRow('Horror', 'row-horror', () => tmdb('/discover/movie', { with_genres: 27, sort_by: 'popularity.desc' }), 'movie');
  loadRow('Animation', 'row-animation', () => tmdb('/discover/movie', { with_genres: 16, sort_by: 'popularity.desc' }), 'movie');
}
init();
</script>
