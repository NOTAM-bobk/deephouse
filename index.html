<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDb Explorer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom scrollbar and line-clamping utilities */
        body {
            background-color: #0a0a0a;
            color: #e2e8f0;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="selection:bg-blue-500/30 pb-20 font-sans antialiased overflow-x-hidden">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 left-0 right-0 z-40 bg-gradient-to-b from-black/90 to-transparent backdrop-blur-sm pt-4 pb-6 px-6 md:px-12 flex flex-col md:flex-row items-center justify-between gap-4 transition-all">
        <div class="flex items-center gap-8 w-full md:w-auto">
            <div class="flex items-center gap-2 text-blue-500">
                <i class="fas fa-film text-3xl"></i>
                <span class="text-2xl font-black tracking-tighter text-white">IMDb</span>
            </div>
            
            <div class="hidden md:flex items-center gap-6 text-sm font-medium" id="nav-tabs">
                <button data-tab="movies" class="nav-tab active-tab transition-colors flex items-center gap-2 pb-1 border-b-2 border-blue-500 text-white">
                    <i class="fas fa-film"></i> Movies
                </button>
                <button data-tab="tv" class="nav-tab transition-colors flex items-center gap-2 pb-1 border-b-2 border-transparent text-slate-400 hover:text-slate-200">
                    <i class="fas fa-tv"></i> TV Shows
                </button>
                <button data-tab="all" class="nav-tab transition-colors flex items-center gap-2 pb-1 border-b-2 border-transparent text-slate-400 hover:text-slate-200">
                    <i class="fas fa-chart-line"></i> All Titles
                </button>
            </div>
        </div>

        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="relative w-full md:w-64 group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-400 transition-colors"></i>
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search titles..."
                    class="w-full bg-slate-900/80 border border-slate-700/50 rounded-full pl-11 pr-10 py-2.5 text-sm focus:outline-none focus:border-blue-500 focus:bg-slate-900 transition-all placeholder:text-slate-500 text-white"
                />
                <button id="clear-search" class="hidden absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div id="hero-section" class="relative h-[80vh] md:h-[90vh] w-full flex items-end pb-24 px-6 md:px-12 pt-32 hidden">
        <!-- Hero content injected via JS -->
    </div>

    <!-- Spacer for Search (Hidden by default) -->
    <div id="search-spacer" class="h-32 hidden"></div>

    <!-- Main Content Area -->
    <main class="px-6 md:px-12 relative z-10">
        
        <!-- Section Title -->
        <div class="mb-8">
            <h2 id="section-title" class="text-2xl font-bold text-white">Movies</h2>
            <p id="error-message" class="text-red-400 mt-2 hidden"></p>
        </div>

        <!-- Movie Grid -->
        <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-4 gap-y-8 md:gap-6">
            <!-- Movie cards injected via JS -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-20 text-slate-500 hidden">
            <i class="fas fa-film text-6xl mx-auto mb-4 opacity-20"></i>
            <p class="text-xl">No titles found.</p>
        </div>
    </main>

    <!-- Movie Details Modal -->
    <div id="movie-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 md:p-12 hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" id="modal-backdrop"></div>
        
        <div class="relative w-full max-w-5xl bg-slate-900 rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh] transform scale-95 transition-transform duration-300" id="modal-content-wrapper">
            <button id="close-modal" class="absolute top-4 right-4 z-20 w-10 h-10 flex items-center justify-center bg-black/50 hover:bg-black text-white rounded-full transition-colors backdrop-blur-md">
                <i class="fas fa-times"></i>
            </button>
            
            <div id="modal-content" class="flex flex-col md:flex-row w-full h-full overflow-hidden">
                <!-- Modal content injected via JS -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://api.imdbapi.dev';
        
        // App State
        let state = {
            movies: [],
            featuredMovie: null,
            activeTab: 'movies',
            searchQuery: '',
            isLoading: false
        };

        const categories = {
            'movies': { label: 'Movies', endpoint: '/titles?titleType=movie' },
            'tv': { label: 'TV Shows', endpoint: '/titles?titleType=tvSeries' },
            'all': { label: 'All Titles', endpoint: '/titles' }
        };

        // DOM Elements
        const heroSection = document.getElementById('hero-section');
        const searchSpacer = document.getElementById('search-spacer');
        const movieGrid = document.getElementById('movie-grid');
        const sectionTitle = document.getElementById('section-title');
        const errorMessage = document.getElementById('error-message');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const clearSearchBtn = document.getElementById('clear-search');
        const navTabs = document.querySelectorAll('.nav-tab');
        
        // Modal Elements
        const movieModal = document.getElementById('movie-modal');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const closeModalBtn = document.getElementById('close-modal');
        const modalContent = document.getElementById('modal-content');
        const modalWrapper = document.getElementById('modal-content-wrapper');

        // --- Data Normalization ---
        const normalizeMovie = (m) => ({
            id: m.id || m.titleId || Math.random().toString(),
            title: m.title || m.titleName || m.name || 'Unknown Title',
            image: m.image?.url || m.image || m.poster || 'https://via.placeholder.com/500x750/1e293b/ffffff?text=No+Image',
            rating: m.rating?.star || m.rating || m.averageRating || 0,
            year: m.year || (m.releaseDate ? new Date(m.releaseDate).getFullYear() : 'Unknown'),
            overview: m.plot || m.description || m.overview || 'No overview available.',
            type: m.titleType || m.type || 'title'
        });

        // --- Fetch Logic ---
        async function fetchMovies(endpoint, query = '') {
            state.isLoading = true;
            renderLoading();
            errorMessage.classList.add('hidden');
            emptyState.classList.add('hidden');

            try {
                let url = `${API_BASE_URL}${endpoint}`;
                if (query) {
                    url = `${API_BASE_URL}/search/titles?query=${encodeURIComponent(query)}`;
                }

                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch data from IMDb API.');

                const data = await response.json();
                
                let results = [];
                if (Array.isArray(data)) results = data;
                else if (data.titles) results = data.titles;
                else if (data.results) results = data.results;
                else if (data.data) results = data.data;

                const normalized = results.map(normalizeMovie).filter(m => m.image && !m.image.includes('No+Image'));
                state.movies = normalized;

                if (!query && normalized.length > 0) {
                    const randomIndex = Math.floor(Math.random() * Math.min(5, normalized.length));
                    state.featuredMovie = normalized[randomIndex];
                }

                renderApp();

            } catch (err) {
                console.error(err);
                movieGrid.innerHTML = '';
                errorMessage.textContent = err.message;
                errorMessage.classList.remove('hidden');
                heroSection.classList.add('hidden');
            } finally {
                state.isLoading = false;
            }
        }

        // --- Rendering ---
        function renderLoading() {
            movieGrid.innerHTML = Array(12).fill(0).map(() => 
                `<div class="aspect-[2/3] bg-slate-800/50 rounded-xl animate-pulse border border-slate-700/30"></div>`
            ).join('');
        }

        function renderApp() {
            // Update Title
            sectionTitle.textContent = state.searchQuery 
                ? `Search Results for "${state.searchQuery}"` 
                : categories[state.activeTab].label;

            // Handle Hero visibility
            if (state.searchQuery) {
                heroSection.classList.add('hidden');
                searchSpacer.classList.remove('hidden');
            } else if (state.featuredMovie) {
                renderHero();
                heroSection.classList.remove('hidden');
                searchSpacer.classList.add('hidden');
            }

            // Render Grid
            if (state.movies.length === 0) {
                movieGrid.innerHTML = '';
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                movieGrid.innerHTML = state.movies.map(movie => `
                    <div class="group relative cursor-pointer" onclick="openModal('${movie.id}')">
                        <div class="relative aspect-[2/3] rounded-xl overflow-hidden bg-slate-800 mb-3 shadow-lg shadow-black/40 border border-slate-700/50">
                            <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500" loading="lazy" onerror="this.src='https://via.placeholder.com/500x750/1e293b/ffffff?text=No+Image'">
                            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center backdrop-blur-[2px]">
                                <i class="fas fa-play text-4xl text-white opacity-90 group-hover:scale-110 transition-transform"></i>
                            </div>
                            <div class="absolute top-2 right-2 bg-black/70 backdrop-blur-md px-2 py-1 rounded-md flex items-center gap-1.5 text-xs font-bold text-yellow-400 border border-white/10">
                                <i class="fas fa-star text-[10px]"></i>
                                ${Number(movie.rating).toFixed(1)}
                            </div>
                        </div>
                        <h3 class="font-semibold text-slate-200 truncate group-hover:text-blue-400 transition-colors">${movie.title}</h3>
                        <p class="text-sm text-slate-500 flex justify-between items-center mt-1">
                            <span>${movie.year}</span>
                            <span class="uppercase text-[10px] font-bold tracking-wider bg-slate-800 text-slate-300 px-2 py-0.5 rounded border border-slate-700/50">${movie.type}</span>
                        </p>
                    </div>
                `).join('');
            }
        }

        function renderHero() {
            const m = state.featuredMovie;
            heroSection.innerHTML = `
                <div class="absolute inset-0 z-0">
                    <img src="${m.image}" alt="${m.title}" class="w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-r from-black/100 via-black/70 to-transparent"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a]/40 to-transparent"></div>
                </div>
                <div class="relative z-10 max-w-2xl w-full">
                    <span class="uppercase text-xs font-bold tracking-widest text-blue-400 mb-3 block">Featured Title</span>
                    <h1 class="text-5xl md:text-7xl font-bold text-white mb-4 drop-shadow-2xl leading-tight">${m.title}</h1>
                    
                    <div class="flex items-center gap-4 text-sm font-semibold text-slate-300 mb-6 drop-shadow">
                        <div class="flex items-center gap-1.5 text-yellow-400 bg-black/40 px-2 py-1 rounded backdrop-blur-sm border border-white/10">
                            <i class="fas fa-star"></i>
                            <span>${Number(m.rating).toFixed(1)} Rating</span>
                        </div>
                        <span>•</span>
                        <span>${m.year}</span>
                        <span>•</span>
                        <span class="uppercase text-xs border border-slate-600 px-2 py-1 rounded tracking-wider bg-black/20">${m.type}</span>
                    </div>

                    <p class="text-slate-300 text-lg mb-8 line-clamp-3 drop-shadow-md max-w-xl leading-relaxed">
                        ${m.overview}
                    </p>

                    <div class="flex flex-col sm:flex-row items-center gap-4">
                        <button onclick="openModal('${m.id}')" class="w-full sm:w-auto bg-white text-black px-8 py-3.5 rounded-full font-bold flex items-center justify-center gap-2 hover:bg-slate-200 transition-transform hover:scale-105">
                            <i class="fas fa-play"></i> Play Trailer
                        </button>
                        <button onclick="openModal('${m.id}')" class="w-full sm:w-auto bg-slate-800/80 hover:bg-slate-700 text-white backdrop-blur-md px-8 py-3.5 rounded-full font-bold flex items-center justify-center gap-2 border border-slate-600 transition-colors">
                            <i class="fas fa-info-circle"></i> More Info
                        </button>
                    </div>
                </div>
            `;
        }

        // --- Modal Logic ---
        window.openModal = function(id) {
            const movie = state.movies.find(m => m.id === id) || (state.featuredMovie?.id === id ? state.featuredMovie : null);
            if (!movie) return;

            modalContent.innerHTML = `
                <!-- Poster Section (Hidden on mobile) -->
                <div class="hidden md:block w-1/3 bg-slate-800 shrink-0 relative">
                    <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
                </div>

                <!-- Details Section -->
                <div class="flex-1 overflow-y-auto bg-slate-900">
                    <!-- Mobile Header Image -->
                    <div class="md:hidden relative h-64 w-full bg-slate-800">
                        <img src="${movie.image}" alt="${movie.title}" class="w-full h-full object-cover opacity-70">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent"></div>
                    </div>

                    <div class="p-6 md:p-10 relative z-10 -mt-10 md:mt-0">
                        <h2 class="text-3xl md:text-5xl font-bold text-white mb-4 drop-shadow-lg">${movie.title}</h2>
                        
                        <div class="flex flex-wrap items-center gap-4 text-sm font-medium text-slate-400 mb-8">
                            <span class="flex items-center gap-1.5 text-yellow-400 bg-yellow-400/10 px-3 py-1.5 rounded-md border border-yellow-400/20">
                                <i class="fas fa-star"></i> ${Number(movie.rating).toFixed(1)} / 10
                            </span>
                            <span>•</span>
                            <span>Released: ${movie.year}</span>
                            <span>•</span>
                            <span class="uppercase border border-slate-700 bg-slate-800 px-2 py-1 rounded text-xs tracking-wider">
                                ${movie.type}
                            </span>
                        </div>

                        <div class="space-y-6">
                            <div>
                                <h3 class="text-lg font-semibold text-white mb-3 flex items-center gap-2">
                                    <i class="fas fa-align-left text-blue-500"></i> Overview
                                </h3>
                                <p class="text-slate-300 leading-relaxed text-lg">
                                    ${movie.overview}
                                </p>
                            </div>

                            <div class="pt-8 border-t border-slate-800 flex flex-wrap gap-4">
                                <button class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3.5 rounded-xl font-bold flex items-center gap-2 transition-all hover:shadow-lg hover:shadow-blue-600/30">
                                    <i class="fas fa-play"></i> Watch Trailer
                                </button>
                                <button class="bg-slate-800 hover:bg-slate-700 text-white px-8 py-3.5 rounded-xl font-bold border border-slate-700 transition-colors flex items-center gap-2">
                                    <i class="fas fa-plus"></i> Add to Watchlist
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            movieModal.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                movieModal.classList.remove('opacity-0');
                modalWrapper.classList.remove('scale-95');
                modalWrapper.classList.add('scale-100');
            }, 10);
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            movieModal.classList.add('opacity-0');
            modalWrapper.classList.remove('scale-100');
            modalWrapper.classList.add('scale-95');
            
            setTimeout(() => {
                movieModal.classList.add('hidden');
                document.body.style.overflow = 'auto'; // Restore scrolling
            }, 300); // match transition duration
        }

        // --- Event Listeners ---
        
        // Navigation Tabs
        navTabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                // Update styling
                navTabs.forEach(t => {
                    t.classList.remove('border-blue-500', 'text-white', 'active-tab');
                    t.classList.add('border-transparent', 'text-slate-400');
                });
                const clickedTab = e.currentTarget;
                clickedTab.classList.remove('border-transparent', 'text-slate-400');
                clickedTab.classList.add('border-blue-500', 'text-white', 'active-tab');

                // Update state and fetch
                state.activeTab = clickedTab.dataset.tab;
                state.searchQuery = '';
                searchInput.value = '';
                clearSearchBtn.classList.add('hidden');
                
                fetchMovies(categories[state.activeTab].endpoint);
            });
        });

        // Search Input with Debounce
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            state.searchQuery = query;
            
            if (query.length > 0) {
                clearSearchBtn.classList.remove('hidden');
            } else {
                clearSearchBtn.classList.add('hidden');
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                if (query.trim()) {
                    // Deselect tabs visually when searching
                    navTabs.forEach(t => {
                        t.classList.remove('border-blue-500', 'text-white');
                        t.classList.add('border-transparent', 'text-slate-400');
                    });
                    fetchMovies('/search/titles', query);
                } else {
                    // Restore active tab
                    const activeBtn = document.querySelector(`.nav-tab[data-tab="${state.activeTab}"]`);
                    activeBtn.click(); // Trigger fetch via click logic
                }
            }, 500);
        });

        // Clear Search
        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            state.searchQuery = '';
            clearSearchBtn.classList.add('hidden');
            const activeBtn = document.querySelector(`.nav-tab[data-tab="${state.activeTab}"]`);
            activeBtn.click();
        });

        // Modal Close triggers
        closeModalBtn.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', closeModal);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !movieModal.classList.contains('hidden')) {
                closeModal();
            }
        });

        // --- Initialization ---
        // Start the app by fetching the default tab
        fetchMovies(categories[state.activeTab].endpoint);

    </script>
</body>
</html>
